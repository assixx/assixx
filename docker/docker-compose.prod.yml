# =============================================================================
# Assixx Docker Compose - Production Override (ADR-050 R14 Mitigation)
# =============================================================================
#
# WHY THIS FILE EXISTS (masterplan Step 1.6 / R14):
#   The base `docker-compose.yml` publishes backend on `3000:3000` and frontend
#   on `3001:3001` as a dev convenience (documented in `docs/DOCKER-SETUP.md`).
#   In production that convenience becomes a security hole: an attacker who
#   reaches backend:3000 directly bypasses Nginx entirely, and with it the
#   `TenantHostResolverMiddleware` + `JwtAuthGuard` host-cross-check that
#   ADR-050 relies on to prevent cross-tenant JWT replay. A valid JWT for
#   tenant A sent to `<prod-ip>:3000` with `Host: anything` would succeed
#   because `extractSlug('anything') === null` → cross-check skipped.
#
#   This override drops the public port publishes for backend + frontend so
#   that only `nginx:443` (and `:80` for HTTP→HTTPS redirect) is reachable
#   from the public internet. Backend/frontend stay on the internal
#   `assixx-network` bridge, reachable only by their peer services.
#
# USAGE:
#   doppler run -- docker-compose \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     --profile production up -d
#
# VERIFICATION (on prod host, from an EXTERNAL network — not localhost):
#   nmap -p 3000,3001 <prod-public-ip>   # both filtered
#   nmap -p 80,443    <prod-public-ip>   # both open
#
# DEFERRED DEPENDENCIES (filled in by later masterplan sessions):
#   - `nginx.prod.conf`  — Step 1.5 / Session 5 (HTTPS multi-server config)
#   - `certbot` service  — Step 1.3 / Session 4 (Let's Encrypt DNS-01 sidecar)
#   Until those land, this override is inert — `docker-compose config`
#   parses cleanly but `up -d` would crash-loop nginx (missing cert files).
#   Deployment is gated on all three sessions being complete.
#
# MERGE SEMANTICS:
#   - `ports: !reset []` empties the sequence from the base file.
#   - `volumes: !override [...]` replaces the base volume list entirely
#     (required because Docker refuses two mounts at the same target path).
#   - `ports: !override [...]` on nginx replaces the base `80:80` publish
#     with the explicit 80+443 pair (otherwise the base `80:80` would
#     duplicate on merge and bind-conflict).
#
# @see docs/infrastructure/adr/ADR-050-tenant-subdomain-routing.md §"Production Topology Requirement"
# @see docs/FEAT_TENANT_SUBDOMAIN_ROUTING_MASTERPLAN.md Session 2 / Step 1.6 / R14
# =============================================================================

services:
  # Backend — remove public 3000 publish; only reachable via assixx-network.
  backend:
    ports: !reset []
    environment:
      NODE_ENV: production

  # Frontend — remove public 3001 publish; only reachable via assixx-network.
  frontend:
    ports: !reset []

  # Nginx — swap dev HTTP config for prod HTTPS multi-server config,
  # mount the Let's Encrypt cert volume (read-only), publish 80+443.
  nginx:
    volumes: !override
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/letsencrypt:ro
    ports: !override
      - "80:80"
      - "443:443"

# Named volume for Let's Encrypt certs. Written by the `certbot` sidecar
# (added by Step 1.3 / Session 4), read-only from `nginx`. Volume name is
# stable across recreations so `certbot renew` hits the existing data.
volumes:
  certs:
    name: assixx_certs
