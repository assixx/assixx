# =============================================================================
# Assixx Docker Compose - Development Environment
# =============================================================================
# SECURITY NOTE: Default passwords are provided for development convenience.
# For production, ALWAYS use strong passwords via .env file without defaults!
# See docker/.env.example for required environment variables.
# =============================================================================

services:
  # =============================================
  # PostgreSQL - Primary Database
  # =============================================
  postgres:
    image: postgres:17-alpine
    container_name: assixx-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Berlin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - assixx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assixx_user -d assixx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Assixx Backend (Development Mode with Live Reload)
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: assixx-backend:dev
    container_name: assixx-backend
    restart: unless-stopped
    # Best Practice: Use host user UID/GID to prevent permission conflicts
    user: "${UID:-1000}:${GID:-1000}"
    # Resource limits prevent runaway processes (generous for dev with TypeScript)
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      CI: "true"
      # PostgreSQL Connection (app_user with RLS)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-default-dev-jwt-secret}
      SESSION_SECRET: ${SESSION_SECRET:-default-dev-session-secret}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      DELETION_GRACE_PERIOD_DAYS: ${DELETION_GRACE_PERIOD_DAYS:-30}
      DELETION_COOLING_OFF_HOURS: ${DELETION_COOLING_OFF_HOURS:-24}
      TENANT_DELETION_GRACE_MINUTES: ${TENANT_DELETION_GRACE_MINUTES:-43200}
      SCARF_ANALYTICS: false
      DO_NOT_TRACK: 1
      # Redis Connection (for rate limiting)
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    volumes:
      - ../uploads:/app/uploads
      - ../backend/logs:/app/backend/logs
      - ../exports:/exports
      - ../backups:/backups
      # Live-Reload Volumes für Entwicklung
      - ../backend:/app/backend:delegated
      - ../frontend:/app/frontend:delegated
      - ../scripts:/app/scripts:delegated
      - ../Testing:/app/Testing:delegated
      - ../package.json:/app/package.json:delegated
      # pnpm-lock.yaml als read-only mounten (löst EBUSY Problem)
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:delegated
      - ../tsconfig.json:/app/tsconfig.json:delegated
      - ../tsconfig.base.json:/app/tsconfig.base.json:delegated
      - ../eslint.config.js:/app/eslint.config.js:delegated
      - ../vitest.config.ts:/app/vitest.config.ts:delegated
      - ../vitest.setup.ts:/app/vitest.setup.ts:delegated
      - ../.prettierignore:/app/.prettierignore:delegated
      - ../.prettierrc.json:/app/.prettierrc.json:delegated
      - ../.npmrc:/app/.npmrc:delegated
      - ../nodemon.json:/app/nodemon.json:delegated
      - ../.env:/app/.env:ro
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    # Development command - build NestJS and run (tsx doesn't support decorators)
    # Note: pnpm install is done during docker build, not at runtime
    command: sh -c "cd backend && pnpm run build && node dist/nest/main.js"

  # Redis für Rate-Limiting und Session Cache (REQUIRED for Backend)
  redis:
    image: redis:7-alpine
    container_name: assixx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Resource limits for cache service (generous for dev)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    volumes:
      - redis_data:/data
    networks:
      - assixx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tenant Deletion Worker
  # Uses Redis via tenantDeletionService.clearRedisCache() during tenant deletion
  deletion-worker:
    image: assixx-backend:dev
    container_name: assixx-deletion-worker
    restart: unless-stopped
    # Best Practice: Use host user UID/GID to prevent permission conflicts
    user: "${UID:-1000}:${GID:-1000}"
    # Resource limits for worker process (generous for dev)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CI: "true"
      # PostgreSQL Connection (app_user with RLS)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-default-dev-jwt-secret}
      SESSION_SECRET: ${SESSION_SECRET:-default-dev-session-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DELETION_WORKER_HEALTH_PORT: 3002
      DELETION_GRACE_PERIOD_DAYS: ${DELETION_GRACE_PERIOD_DAYS:-30}
      DELETION_COOLING_OFF_HOURS: ${DELETION_COOLING_OFF_HOURS:-24}
      TENANT_DELETION_GRACE_MINUTES: ${TENANT_DELETION_GRACE_MINUTES:-43200}
      # Email settings for deletion notifications
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "3002:3002" # Health check port (changed from 3001 - SvelteKit uses 3001)
    volumes:
      - ../backend:/app/backend:delegated
      - ../scripts:/app/scripts:delegated
      - ../package.json:/app/package.json:delegated
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:delegated
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:delegated
      - ../tsconfig.json:/app/tsconfig.json:delegated
      - ../tsconfig.base.json:/app/tsconfig.base.json:delegated
      - ../.env:/app/.env:ro
      - /app/node_modules
      - ../exports:/exports
      - ../backups:/backups
      # Worker specific logs
      - ../backend/logs/deletion-worker:/app/backend/logs/deletion-worker
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3002/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    # Worker command - use tsx directly
    command: ["pnpm", "exec", "tsx", "/app/backend/src/workers/deletionWorker.ts"]

  # ===========================================================================
  # SvelteKit Frontend (Production)
  # ===========================================================================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: assixx-frontend:prod
    container_name: assixx-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: 3001
      ORIGIN: ${ORIGIN:-http://localhost}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-10M}
      # API URL for SSR server-side fetches (inside Docker network)
      API_URL: http://backend:3000/api/v2
    ports:
      - "3001:3001" # Direct access for debugging
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - production

  # ===========================================================================
  # Nginx Reverse Proxy (Production)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: assixx-nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment for HTTPS
    depends_on:
      - frontend
      - backend
    networks:
      - assixx-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - production

  # Optional: Nginx als Reverse Proxy (für Production) - REPLACED by above
  # nginx:
  #   image: nginx:alpine
  #   container_name: assixx-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
  #     - ./frontend/dist:/usr/share/nginx/html:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - assixx-network

networks:
  assixx-network:
    driver: bridge

volumes:
  postgres_data:
    name: assixx_postgres_data
    external: true
  redis_data:
    name: assixx_redis_data
    external: true
  pnpm-store:
