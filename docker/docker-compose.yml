# =============================================================================
# Assixx Docker Compose - Development Environment
# =============================================================================
#
# SECURITY NOTES:
# 1. All secrets are managed by Doppler. Start with: doppler run -- docker-compose up -d
#    Without Doppler, required secrets (:? checks) will cause clear error messages.
#
# 2. IMAGE PINNING: This file uses version tags (e.g., postgres:18.3-alpine).
#    For production deployments, consider pinning images with SHA256 digests:
#      image: postgres:18.3-alpine@sha256:<digest>
#    Get digests with: docker pull postgres:18.3-alpine && docker inspect --format='{{index .RepoDigests 0}}' postgres:18.3-alpine
#
# 3. See docker/.env.example for required environment variables.
#
# =============================================================================

services:
  # =============================================
  # PostgreSQL - Primary Database
  # =============================================
  postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile.pg-partman
    image: assixx-postgres:18-partman
    container_name: assixx-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    # PostgreSQL Performance Configuration
    # pg_stat_statements: Query performance tracking (essential for optimization)
    # pg_partman_bgw: Automatic partition maintenance (daily)
    # track_io_timing: I/O statistics per query
    # Reference: https://www.postgresql.org/docs/18/pgstatstatements.html
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements,pg_partman_bgw"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "track_io_timing=on"
      # pg_partman Background Worker — daily partition maintenance
      - "-c"
      - "pg_partman_bgw.dbname=assixx"
      - "-c"
      - "pg_partman_bgw.interval=86400"
      - "-c"
      - "pg_partman_bgw.role=assixx_user"
      - "-c"
      - "pg_partman_bgw.jobmon=off"
      # pg_partman recommendation (default: 64, raised for partition DDL)
      - "-c"
      - "max_locks_per_transaction=128"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set - use doppler run}
      POSTGRES_DB: ${POSTGRES_DB}
      # PG18 changed default PGDATA from /var/lib/postgresql/data to
      # /var/lib/postgresql/18/docker. Override to keep existing volume mount.
      PGDATA: /var/lib/postgresql/data
      TZ: Europe/Berlin
    ports:
      # SECURITY: Bind to localhost only - not accessible from external networks
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - assixx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assixx_user -d assixx"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Assixx Backend (Development Mode with Live Reload)
  # Profile `dev`: live-reload via volume-mounts, builds TS at container startup.
  # For Production-Parität (compiled image, fast cold-start) → `backend-prod`.
  # Default profile is set via docker/.env (COMPOSE_PROFILES=dev) — see ADR-027.
  backend:
    profiles: [dev]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        # Node/pnpm versions - configurable via .env (Single Source of Truth)
        NODE_VERSION: ${NODE_VERSION_DEV:-24.15.0-bookworm-slim}
        PNPM_VERSION: ${PNPM_VERSION:-10.33.2}
        # npm parameterised so dependabot/manual review can track CVE-bumps
        # centrally — see ADR-027 §"Amendment 2026-04-27".
        NPM_VERSION: ${NPM_VERSION:-11.13.0}
    image: assixx-backend:dev
    container_name: assixx-backend
    restart: unless-stopped
    # Best Practice: Use host user UID/GID to prevent permission conflicts
    user: "${UID:-1000}:${GID:-1000}"
    # Resource limits prevent runaway processes (generous for dev with TypeScript)
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      CI: "true"
      # PostgreSQL Connection (app_user with RLS)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set - use doppler run}
      DB_NAME: ${POSTGRES_DB}
      # PostgreSQL System Connection (system_user with BYPASSRLS — for cron, auth, root)
      DB_SYSTEM_USER: ${DB_SYSTEM_USER:-system_user}
      DB_SYSTEM_PASSWORD: ${DB_SYSTEM_PASSWORD:?DB_SYSTEM_PASSWORD must be set - use doppler run}
      # SECURITY: Secrets are REQUIRED - no fallback defaults
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set - use doppler run}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set - use doppler run}
      # OAuth sign-in (V1: Microsoft only) — see docs/FEAT_MICROSOFT_OAUTH_MASTERPLAN.md
      # PUBLIC_APP_URL: base URL the backend uses to derive OAuth redirect URIs (R4 mitigation).
      # Boot fails fast if any of these are missing — matches the JWT_SECRET pattern.
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL must be set - use doppler run}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:?MICROSOFT_OAUTH_CLIENT_ID must be set - use doppler run}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:?MICROSOFT_OAUTH_CLIENT_SECRET must be set - use doppler run}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      TENANT_DELETION_GRACE_MINUTES: ${TENANT_DELETION_GRACE_MINUTES:-43200}
      # Log level override (default: info, set to debug for troubleshooting)
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCARF_ANALYTICS: false
      DO_NOT_TRACK: 1
      # Redis Connection (for rate limiting)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - use doppler run}
      # Sentry Error Tracking
      SENTRY_DSN: ${SENTRY_DSN:-}
      # OpenTelemetry → Grafana Tempo (ADR-048 / FEAT_TEMPO_OTEL_MASTERPLAN Phase 2)
      # Default OFF — Sentry behavior is completely unchanged until flag is flipped.
      # Flip via Doppler: `doppler secrets set OTEL_TEMPO_ENABLED=true`
      # Rollback: flip to false + `docker-compose restart backend` (≈10s)
      OTEL_TEMPO_ENABLED: ${OTEL_TEMPO_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      # Prometheus Exemplars (ADR-048 / FEAT_TEMPO_OTEL_MASTERPLAN Session 3b)
      # Default OFF — /api/v2/metrics serves plain Prometheus format, no exemplars.
      # Flag ON → OpenMetrics content-type + trace_id/span_id exemplar labels on
      # assixx_http_request_duration_seconds. Resolved at boot (main.ts +
      # metrics.controller.ts); flag flip requires container recreation.
      # Requires Prometheus server flag --enable-feature=exemplar-storage (Session 3b-b).
      PROMETHEUS_EXEMPLARS_ENABLED: ${PROMETHEUS_EXEMPLARS_ENABLED:-false}
      # Loki Log Aggregation - Dual Target Support
      # LOKI_URL: Grafana Cloud (requires GRAFANA_CLOUD_USER + API_KEY)
      LOKI_URL: ${LOKI_URL:-}
      # LOKI_LOCAL_URL: Local Docker Loki (no auth needed)
      LOKI_LOCAL_URL: ${LOKI_LOCAL_URL:-http://loki:3100}
      # Grafana Cloud credentials (optional - for cloud logging)
      GRAFANA_CLOUD_USER: ${GRAFANA_CLOUD_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ../uploads:/app/uploads
      - ../backend/logs:/app/backend/logs
      - ../exports:/exports
      - ../backups:/backups
      # Live-Reload Volumes für Entwicklung (source code - need write for hot reload)
      - ../backend:/app/backend:delegated
      - ../frontend:/app/frontend:delegated
      - ../shared:/app/shared:delegated
      - ../scripts:/app/scripts:delegated
      - ../Testing:/app/Testing:delegated
      # Config files - read-only (edited on host, synced to container)
      # SECURITY: No write access needed, prevents accidental modification
      - ../package.json:/app/package.json:ro
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ../tsconfig.json:/app/tsconfig.json:ro
      - ../tsconfig.base.json:/app/tsconfig.base.json:ro
      - ../eslint.config.mjs:/app/eslint.config.mjs:ro
      - ../vitest.config.ts:/app/vitest.config.ts:ro
      - ../vitest.setup.ts:/app/vitest.setup.ts:ro
      - ../.prettierignore:/app/.prettierignore:ro
      - ../.prettierrc.json:/app/.prettierrc.json:ro
      - ../.npmrc:/app/.npmrc:ro
      - ../nodemon.json:/app/nodemon.json:ro
      - ../.env:/app/.env:ro
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      # Grace period covers TS build (~60s) + NestJS bootstrap (~10s)
      # start_interval polls every 5s during startup for fast detection
      start_period: 120s
      start_interval: 5s
    # Development command — incremental rebuild + hot-reload (2026-04-28).
    #
    # WHY: Previous chain `tsc && node dist/nest/main.js` paid the full
    #      tsc cold-start (≈60s) on every `docker-compose restart backend`,
    #      even though `tsconfig.json` has `incremental: true`. Source-edit
    #      iteration required restarting the whole container.
    #
    # WHY tsc, not tsx: empirically validated 2026-04-28 — tsx 4.21 (esbuild
    #      0.27 backend) emits decorator-metadata unevenly for cross-module
    #      type references. NestJS DI breaks reproducibly at
    #      ShiftHandoverEntriesService (`db` param at index [0] resolved to
    #      undefined despite correct `import { DatabaseService }`). tsc is
    #      the only decorator-metadata-complete compiler for this stack.
    #
    # FLOW:
    #   1. Build @assixx/shared (one-shot, prerequisite for backend tsc).
    #   2. `pnpm exec tsc` — initial blocking build, fully populates dist/
    #      BEFORE nodemon starts (no race with empty dist/).
    #   3. `pnpm exec tsc -w &` — incremental watcher in background; only
    #      changed files re-emit (~1–2 s on save).
    #   4. `exec pnpm exec nodemon --watch dist --delay 1500ms` — nodemon
    #      becomes PID 1 (clean SIGTERM), watches dist/, debounces 1.5 s
    #      to let tsc finish multi-file emits before restart.
    #
    # ADR-027 §3 anonymous-volume-EACCES NOT triggered: this command writes
    # only to /app/backend/dist (host-mounted volume), never to
    # /app/node_modules. Read of nodemon binary from root-owned
    # node_modules works (executable bit set for `o`).
    command:
      - sh
      - -c
      - |
        set -e
        pnpm --filter @assixx/shared run build
        cd backend
        pnpm exec tsc
        pnpm exec tsc -w --preserveWatchOutput &
        exec pnpm exec nodemon --watch dist --delay 1500ms dist/nest/main.js

  # Redis für Rate-Limiting und Session Cache (REQUIRED for Backend)
  redis:
    image: redis:8.6.2-alpine
    container_name: assixx-redis
    restart: unless-stopped
    # SECURITY: Redis with password authentication
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - use doppler run}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # Resource limits for cache service (generous for dev)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    volumes:
      - redis_data:/data
    networks:
      - assixx-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tenant Deletion Worker
  # Uses Redis via tenantDeletionService.clearRedisCache() during tenant deletion
  # Profile `dev`: shares assixx-backend:dev image; runs pre-built dist via volume.
  # Production-Pendant siehe `deletion-worker-prod:` Service unten.
  deletion-worker:
    profiles: [dev]
    image: assixx-backend:dev
    container_name: assixx-deletion-worker
    restart: unless-stopped
    # Best Practice: Use host user UID/GID to prevent permission conflicts
    user: "${UID:-1000}:${GID:-1000}"
    # Resource limits for worker process (generous for dev)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      CI: "true"
      # PostgreSQL Connection (app_user with RLS)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set - use doppler run}
      DB_NAME: ${POSTGRES_DB}
      # PostgreSQL System Connection (system_user with BYPASSRLS — for tenant deletion)
      DB_SYSTEM_USER: ${DB_SYSTEM_USER:-system_user}
      DB_SYSTEM_PASSWORD: ${DB_SYSTEM_PASSWORD:?DB_SYSTEM_PASSWORD must be set - use doppler run}
      # SECURITY: Secrets are REQUIRED - no fallback defaults
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set - use doppler run}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set - use doppler run}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - use doppler run}
      DELETION_WORKER_HEALTH_PORT: 3002
      TENANT_DELETION_GRACE_MINUTES: ${TENANT_DELETION_GRACE_MINUTES:-43200}
      # Sentry Error Tracking
      SENTRY_DSN: ${SENTRY_DSN:-}
      # OpenTelemetry → Grafana Tempo (ADR-048 Phase 2 — default OFF)
      OTEL_TEMPO_ENABLED: ${OTEL_TEMPO_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      # Prometheus Exemplars (ADR-048 Session 3b — default OFF)
      # No-op in deletion-worker (no Fastify/HTTP surface); declared here for
      # image-env consistency and to keep flag flips symmetric with backend.
      PROMETHEUS_EXEMPLARS_ENABLED: ${PROMETHEUS_EXEMPLARS_ENABLED:-false}
      # Loki Log Aggregation - Dual Target Support
      # LOKI_URL: Grafana Cloud (requires GRAFANA_CLOUD_USER + API_KEY)
      LOKI_URL: ${LOKI_URL:-}
      # LOKI_LOCAL_URL: Local Docker Loki (no auth needed)
      LOKI_LOCAL_URL: ${LOKI_LOCAL_URL:-http://loki:3100}
      # Grafana Cloud credentials (optional - for cloud logging)
      GRAFANA_CLOUD_USER: ${GRAFANA_CLOUD_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      # Email settings for deletion notifications
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "3002:3002" # Health check port (changed from 3001 - SvelteKit uses 3001)
    volumes:
      - ../backend:/app/backend:delegated
      - ../shared:/app/shared:delegated
      - ../scripts:/app/scripts:delegated
      - ../package.json:/app/package.json:delegated
      - ../pnpm-lock.yaml:/app/pnpm-lock.yaml:delegated
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:delegated
      - ../tsconfig.json:/app/tsconfig.json:delegated
      - ../tsconfig.base.json:/app/tsconfig.base.json:delegated
      - ../.env:/app/.env:ro
      - /app/node_modules
      - ../exports:/exports
      - ../backups:/backups
      # Worker specific logs
      - ../backend/logs/deletion-worker:/app/backend/logs/deletion-worker
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3002/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      # Worker runs pre-compiled JS — starts in ~3-5s
      start_period: 30s
      start_interval: 5s
    # Worker command - run compiled JS (tsx can't handle parameter decorators like @Inject)
    # Backend build (via service_healthy dependency) populates dist/ on shared volume
    #
    # NOTE: A previous attempt (ADR-027 amendment 2026-04-08, ROLLED BACK) added
    # `pnpm install --frozen-lockfile` to this entrypoint to mitigate volume drift.
    # See backend service comment above for the EACCES failure mode that forced
    # the rollback.
    command: ["node", "backend/dist/workers/deletion-worker.js"]

  # ===========================================================================
  # Backend (Production) — multi-stage Dockerfile mit pnpm deploy
  # ===========================================================================
  # Implementiert das ADR-027 §"Decision 3 — pnpm deploy for Backend" (2026-04-27).
  # CI baut dieselbe Datei (`docker/Dockerfile`) für ghcr.io-Push (siehe
  # .github/workflows/docker-image-build.yml). Lokales --profile production
  # ist jetzt 1:1 äquivalent zur CI-Production-Pipeline.
  #
  # Unterschiede zu `backend:` (dev):
  #  - Dockerfile (multi-stage) statt Dockerfile.dev (single-stage)
  #  - User aus Dockerfile (nodejs:1001) — KEIN host-UID-Override
  #  - KEINE source-mounts (image ist self-contained, dist/ vorgebaut)
  #  - CMD aus Dockerfile (`dumb-init node backend/dist/nest/main.js`)
  #  - start_period 15s (statt 120s) — kein TS-Compile bei Container-Start
  # ===========================================================================
  backend-prod:
    profiles: [production]
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Versionen identisch zur dev-Variante (Single Source of Truth via .env)
        NODE_VERSION: ${NODE_VERSION_PROD:-24.15.0-bookworm-slim}
        PNPM_VERSION: ${PNPM_VERSION:-10.33.2}
        NPM_VERSION: ${NPM_VERSION:-11.13.0}
    image: assixx-backend:prod
    container_name: assixx-backend
    restart: unless-stopped
    # User aus Dockerfile (USER nodejs → 1001:1001) — NICHT überschreiben.
    deploy:
      resources:
        limits:
          # Reduziertes Memory-Limit gegenüber dev — kein TS-Compile zur Laufzeit
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M
    environment:
      # Identische Env-Var-Liste wie `backend:` (dev) — einzige Abweichung NODE_ENV.
      NODE_ENV: production
      PORT: 3000
      CI: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set - use doppler run}
      DB_NAME: ${POSTGRES_DB}
      DB_SYSTEM_USER: ${DB_SYSTEM_USER:-system_user}
      DB_SYSTEM_PASSWORD: ${DB_SYSTEM_PASSWORD:?DB_SYSTEM_PASSWORD must be set - use doppler run}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set - use doppler run}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set - use doppler run}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL must be set - use doppler run}
      MICROSOFT_OAUTH_CLIENT_ID: ${MICROSOFT_OAUTH_CLIENT_ID:?MICROSOFT_OAUTH_CLIENT_ID must be set - use doppler run}
      MICROSOFT_OAUTH_CLIENT_SECRET: ${MICROSOFT_OAUTH_CLIENT_SECRET:?MICROSOFT_OAUTH_CLIENT_SECRET must be set - use doppler run}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      TENANT_DELETION_GRACE_MINUTES: ${TENANT_DELETION_GRACE_MINUTES:-43200}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCARF_ANALYTICS: false
      DO_NOT_TRACK: 1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - use doppler run}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_TEMPO_ENABLED: ${OTEL_TEMPO_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      PROMETHEUS_EXEMPLARS_ENABLED: ${PROMETHEUS_EXEMPLARS_ENABLED:-false}
      LOKI_URL: ${LOKI_URL:-}
      LOKI_LOCAL_URL: ${LOKI_LOCAL_URL:-http://loki:3100}
      GRAFANA_CLOUD_USER: ${GRAFANA_CLOUD_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      # Nur Daten-Volumes — KEINE source-mounts (image ist self-contained).
      # nodejs-User (1001) braucht write-access auf logs/uploads/exports/backups.
      # Anonymous /app/node_modules wird HIER absichtlich NICHT gemountet —
      # Production-Image hat bereits /app/node_modules aus `pnpm deploy`.
      - ../uploads:/app/uploads
      - ../backend/logs:/app/backend/logs
      - ../exports:/exports
      - ../backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      assixx-network:
        # Network-Alias `backend` damit frontend's API_URL=http://backend:3000
        # und nginx's `proxy_pass http://backend:3000` ohne Änderung funktionieren.
        # Service-Name `backend-prod` ist intern, aber Konsumenten sehen `backend`.
        aliases:
          - backend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      # Image hat dist/ bereits gebaut → schneller Boot (gemessen ~6s in CI integration-test)
      start_period: 15s
      start_interval: 5s
    # CMD aus Dockerfile: ["dumb-init", "node", "backend/dist/nest/main.js"]

  # ===========================================================================
  # Tenant Deletion Worker (Production) — reuses assixx-backend:prod
  # ===========================================================================
  deletion-worker-prod:
    profiles: [production]
    image: assixx-backend:prod
    container_name: assixx-deletion-worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      NODE_ENV: production
      CI: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set - use doppler run}
      DB_NAME: ${POSTGRES_DB}
      DB_SYSTEM_USER: ${DB_SYSTEM_USER:-system_user}
      DB_SYSTEM_PASSWORD: ${DB_SYSTEM_PASSWORD:?DB_SYSTEM_PASSWORD must be set - use doppler run}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set - use doppler run}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set - use doppler run}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - use doppler run}
      DELETION_WORKER_HEALTH_PORT: 3002
      TENANT_DELETION_GRACE_MINUTES: ${TENANT_DELETION_GRACE_MINUTES:-43200}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_TEMPO_ENABLED: ${OTEL_TEMPO_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      PROMETHEUS_EXEMPLARS_ENABLED: ${PROMETHEUS_EXEMPLARS_ENABLED:-false}
      LOKI_URL: ${LOKI_URL:-}
      LOKI_LOCAL_URL: ${LOKI_LOCAL_URL:-http://loki:3100}
      GRAFANA_CLOUD_USER: ${GRAFANA_CLOUD_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    ports:
      - "3002:3002"
    volumes:
      - ../exports:/exports
      - ../backups:/backups
      - ../backend/logs/deletion-worker:/app/backend/logs/deletion-worker
    depends_on:
      backend-prod:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3002/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s
    # Worker-Entrypoint überschreibt Dockerfile-CMD (welches main.js startet)
    command: ["dumb-init", "node", "backend/dist/workers/deletion-worker.js"]

  # ===========================================================================
  # SvelteKit Frontend (Production)
  # ===========================================================================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        # Node/pnpm versions - configurable via .env (Single Source of Truth)
        NODE_VERSION: ${NODE_VERSION_PROD:-24.15.0-bookworm-slim}
        PNPM_VERSION: ${PNPM_VERSION:-10.33.2}
        # npm parameterised so dependabot/manual review can track CVE-bumps
        # centrally — see ADR-027 §"Amendment 2026-04-27".
        NPM_VERSION: ${NPM_VERSION:-11.13.0}
        # Sentry DSN for error tracking (embedded at build time)
        PUBLIC_SENTRY_DSN: ${PUBLIC_SENTRY_DSN:-}
      # BuildKit secrets - never persisted in image layers (unlike ARG/ENV)
      secrets:
        - sentry_auth_token
    image: assixx-frontend:prod
    container_name: assixx-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      NODE_ENV: production
      PORT: 3001
      # SvelteKit adapter-node URL construction (kit docs §"environment-variables").
      # PROTOCOL_HEADER + HOST_HEADER → event.url is built from X-Forwarded-Proto +
      # X-Forwarded-Host (set by Nginx). Required for ADR-050 multi-tenant subdomain
      # SSR — `assixx.localhost`, `<slug>.assixx.com` must propagate into event.url,
      # otherwise extractSlug() collapses to null and R15 cross-check 403s every
      # authenticated handoff. Static ORIGIN was previously forcing all event.url
      # values to one host, silently defeating subdomain awareness.
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-10M}
      # API URL for SSR server-side fetches (inside Docker network)
      API_URL: http://backend:3000/api/v2
      # Sentry DSN for server-side error tracking (SSR)
      PUBLIC_SENTRY_DSN: ${PUBLIC_SENTRY_DSN:-}
      # Loki Log Aggregation - Dual Target Support (SSR logs)
      LOKI_URL: ${LOKI_URL:-}
      LOKI_LOCAL_URL: ${LOKI_LOCAL_URL:-http://loki:3100}
      GRAFANA_CLOUD_USER: ${GRAFANA_CLOUD_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
    ports:
      - "3001:3001" # Direct access for debugging
    depends_on:
      backend-prod:
        condition: service_healthy
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      # SvelteKit production image starts in ~2-5s
      start_period: 15s
      start_interval: 5s
    profiles:
      - production

  # ===========================================================================
  # Nginx Reverse Proxy (Production)
  # ===========================================================================
  nginx:
    image: nginx:1.29.8-alpine
    container_name: assixx-nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment for HTTPS
    depends_on:
      - frontend
      - backend-prod
    networks:
      - assixx-network
    healthcheck:
      # NOTE: Use curl instead of wget - BusyBox wget resolves localhost to ::1 (IPv6)
      # but nginx only listens on 0.0.0.0:80 (IPv4), causing "Connection refused"
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
      start_interval: 5s
    profiles:
      - production

  # ===========================================================================
  # PLG Stack - Observability (Prometheus + Loki + Grafana)
  # ===========================================================================
  # Start with: docker-compose --profile observability up -d
  # Access Grafana: http://localhost:3050 (admin/admin)
  # ===========================================================================

  # Loki - Log Aggregation
  # Receives logs from pino-loki transport
  loki:
    image: grafana/loki:3.7.1
    container_name: assixx-loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - assixx-network
    # Healthcheck: Loki 3.6.3 is distroless (no wget/curl)
    # Use /ready endpoint via external check or disable
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
      start_interval: 10s
    profiles:
      - observability
      - production

  # Prometheus - Metrics Collection
  # Scrapes /api/v2/metrics from backend
  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: assixx-prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    ports:
      - "9090:9090"
    environment:
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "$${GRAFANA_CLOUD_API_KEY}" > /etc/prometheus/grafana_cloud_api_key
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle \
          --enable-feature=exemplar-storage
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 10s
    profiles:
      - observability
      - production

  # ===========================================================================
  # postgres_exporter - PostgreSQL Metrics for Prometheus
  # WHY: Production-Readiness for Multi-Tenant SaaS — DB-Latenz ist der #1
  # Performance-Killer. Backend-Metrics allein (CPU/Memory/EventLoop) zeigen
  # nicht WARUM eine Request slow ist. postgres_exporter liefert connections,
  # locks, deadlocks, replication lag, bgwriter stats, table sizes.
  # @see docs/infrastructure/adr/ADR-002-alerting-monitoring.md (Phase 5: TODO erledigt)
  # @see docs/infrastructure/adr/ADR-025-pg-stat-statements-query-monitoring.md
  # ===========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: assixx-postgres-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    environment:
      # Separate URI/USER/PASS to avoid URL-encoding issues with special chars in password.
      DATA_SOURCE_URI: "postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_USER}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set - use doppler run}
      # Single-DB setup — disable auto-discovery to avoid noise from template0/template1.
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assixx-network
    profiles:
      - observability
      - production

  # ===========================================================================
  # redis_exporter - Redis Metrics for Prometheus
  # WHY: Cache-Hit-Ratio ist Frühwarnsystem für Performance-Degradation.
  # Liefert: memory usage, evictions, hit/miss ratio, connected clients,
  # command stats (rate per command type), persistence health.
  # @see docs/infrastructure/adr/ADR-002-alerting-monitoring.md
  # ===========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.83.0-alpine
    container_name: assixx-redis-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 16M
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set - use doppler run}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - assixx-network
    profiles:
      - observability
      - production

  # ===========================================================================
  # Tempo - Distributed Tracing Backend (ADR-048)
  # Receives traces from otel-collector via OTLP gRPC.
  # Query API exposed on :3200 for the Grafana Tempo datasource.
  # ===========================================================================
  tempo:
    image: grafana/tempo:2.10.5
    container_name: assixx-tempo
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # HTTP query API (Grafana datasource)
      # 4317/4318 NOT published - internal OTLP receive only (collector → tempo)
    networks:
      - assixx-network
    # NOTE: healthcheck disabled — grafana/tempo:2.10+ ships as distroless
    # (no /bin/sh, no wget/curl/nc inside the container), so CMD-SHELL-based
    # healthchecks fail with "exec: /bin/sh: no such file or directory".
    # Same pattern as otel-collector-contrib (see below). Readiness is still
    # queryable from outside via `curl http://localhost:3200/ready` — the
    # HTTP endpoint is fine, only the in-container shell is missing.
    # Downstream services (grafana, otel-collector) use `service_started`
    # instead of `service_healthy` in their depends_on for this reason.
    healthcheck:
      disable: true
    profiles:
      - observability
      - production

  # ===========================================================================
  # OpenTelemetry Collector - Trace Aggregation + Tail-Sampling (ADR-048)
  # Applications emit OTLP to :4317 (gRPC) or :4318 (HTTP).
  # Forwards sampled traces to tempo:4317 internally.
  # Distribution: contrib (needed for tail_sampling processor).
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    container_name: assixx-otel-collector
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      # Grafana Cloud OTLP fan-out (Phase 5, ADR-048 / FEAT_TEMPO_OTEL_MASTERPLAN).
      # Injected into collector.yaml via ${VAR} substitution at config-load.
      # Values provisioned via Doppler dev/stg/prd — see docs/how-to/HOW-TO-DOPPLER-GUIDE.md §8.
      # Exporter is DEFINED in collector.yaml but NOT yet in pipelines.traces.exporters — Step 5.2.
      GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
      GRAFANA_CLOUD_OTLP_AUTH_B64: ${GRAFANA_CLOUD_OTLP_AUTH_B64}
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC (backends connect here)
      - "4318:4318" # OTLP HTTP (browser-from-frontend path, future use)
      # 13133 and 8888 kept internal (healthcheck + collector-metrics)
    depends_on:
      tempo:
        condition: service_started
    networks:
      - assixx-network
    # NOTE: healthcheck omitted — the otel/opentelemetry-collector-contrib
    # image is distroless-ish (no wget/curl/nc available inside the container
    # for CMD-SHELL healthchecks). The health_check extension on :13133 is
    # reachable from the Docker network for external probes, but containerized
    # self-checks need a tool that the image doesn't ship. Readiness is visible
    # in `docker logs assixx-otel-collector` ("Everything is ready").
    profiles:
      - observability
      - production

  # Grafana - Dashboards & Visualization
  # Pre-configured with Loki and Prometheus datasources
  grafana:
    image: grafana/grafana:13.0.1
    container_name: assixx-grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    ports:
      - "3050:3000"
    environment:
      # Admin credentials (change in production!)
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      # Server settings
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-http://localhost:3050}
      GF_SERVER_DOMAIN: localhost
      # Disable analytics
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      # Enable anonymous access for development (disable in production)
      GF_AUTH_ANONYMOUS_ENABLED: ${GF_ANONYMOUS_ENABLED:-false}
      # Alerting (unified = v11+ single engine)
      GF_ALERTING_ENABLED: true
      GF_UNIFIED_ALERTING_ENABLED: true
      # SMTP for alert emails — reuses the same Doppler-managed SMTP as the
      # backend (SMTP_HOST/USER/PASS/FROM). STARTTLS is mandatory for port 587
      # (Gmail and most providers). See HOW-TO-ALERTING.md for provider-specific
      # notes (Gmail App Passwords, etc.).
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST}:${SMTP_PORT:-587}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASS}
      GF_SMTP_FROM_ADDRESS: ${ALERT_EMAIL_FROM:-${SMTP_FROM}}
      GF_SMTP_FROM_NAME: "Assixx Alerts"
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
      GF_SMTP_SKIP_VERIFY: "false"
      # Secrets referenced by provisioning/alerting/contact-points.yml.
      # Grafana's email + slack validators reject empty strings, which would
      # fail-close the entire provisioning step. So when the real secret is
      # unset we feed RFC-2606 / RFC-6761 reserved sentinels: the contact
      # point provisions cleanly, delivery fails (visible in grafana logs)
      # until a real value is filled in via Doppler. See HOW-TO-ALERTING.md.
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-alerts-unset@assixx.invalid}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.invalid/unset}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - assixx-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 10s
    profiles:
      - observability
      - production

# =============================================================================
# BuildKit Secrets - Passed to build steps without persisting in image layers
# Requires: SENTRY_AUTH_TOKEN env var set via Doppler (or empty = skipped)
# =============================================================================
secrets:
  sentry_auth_token:
    environment: SENTRY_AUTH_TOKEN

networks:
  assixx-network:
    driver: bridge

volumes:
  postgres_data:
    name: assixx_postgres_data
    external: true
  redis_data:
    name: assixx_redis_data
    external: true
  # PLG Stack volumes (not external - created automatically)
  loki_data:
    name: assixx_loki_data
  prometheus_data:
    name: assixx_prometheus_data
  grafana_data:
    name: assixx_grafana_data
  # Tempo traces (ADR-048 — distributed tracing backend)
  tempo_data:
    name: assixx_tempo_data
