# =============================================================================
# Grafana Datasources Provisioning
# =============================================================================
#
# Auto-configures Loki and Prometheus as data sources on Grafana startup.
# No manual configuration needed!
#
# @see https://grafana.com/docs/grafana/latest/administration/provisioning/
# =============================================================================

apiVersion: 1

datasources:
  # Loki - Log Aggregation
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60

  # Prometheus - Metrics Collection
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.x"
