# =============================================================================
# Grafana Alerting - Notification Policies (Routing)
# =============================================================================
# Routes firing alerts to the right contact point based on the `severity` label.
#
# Policy tree:
#   root (receiver: email-default)
#    |-- severity=critical  -> email-default + slack-critical  (immediate)
#    |-- severity=warning   -> email-default                    (grouped 10min)
#    `-- (fallback)         -> email-default                    (groupWait 30s)
#
# Design notes:
#   - groupWait:   initial delay to aggregate simultaneous alerts (debounce).
#   - groupInterval: cadence for follow-up notifications in an active group.
#   - repeatInterval: how often a still-firing alert is re-sent.
#     4h keeps on-call from re-pinged every minute on a long incident,
#     but is short enough that a silently-escalating incident re-surfaces.
#
# Reference: https://grafana.com/docs/grafana/latest/alerting/fundamentals/notification-policies/
# =============================================================================

apiVersion: 1

policies:
  - orgId: 1
    receiver: email-default
    group_by: [grafana_folder, alertname, severity]
    # Fallback window for uncategorized alerts.
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

    routes:
      # Critical: page immediately via both channels.
      - receiver: slack-critical
        object_matchers:
          - [severity, =, critical]
        continue: true # also fall through to email-default
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h

      - receiver: email-default
        object_matchers:
          - [severity, =, critical]
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h

      # Warning: email-only, digest cadence — no Slack to avoid fatigue.
      - receiver: email-default
        object_matchers:
          - [severity, =, warning]
        group_wait: 2m
        group_interval: 10m
        repeat_interval: 12h
