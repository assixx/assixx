# =============================================================================
# Grafana Dashboards Provisioning
# =============================================================================
#
# Auto-loads all dashboards from /var/lib/grafana/dashboards on startup.
#
# @see https://grafana.com/docs/grafana/latest/administration/provisioning/
# =============================================================================

apiVersion: 1

providers:
  - name: "Assixx Dashboards"
    orgId: 1
    folder: "Assixx"
    folderUid: "assixx"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
