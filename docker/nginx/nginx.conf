# =============================================================================
# Assixx Nginx Reverse Proxy Configuration
# =============================================================================
# Routes traffic between SvelteKit frontend and NestJS backend
# Supports both HTTP (development) and HTTPS (production)
# =============================================================================

upstream frontend {
    server frontend:3001;
    keepalive 32;
}

upstream backend {
    server backend:3000;
    keepalive 32;
}

# =============================================================================
# HTTP Server - Redirect to HTTPS in production, serve directly in dev
# =============================================================================
server {
    listen 80;
    server_name localhost;

    # In production with SSL enabled, redirect all HTTP to HTTPS
    # Uncomment the following lines when SSL certificates are configured:
    # return 301 https://$server_name$request_uri;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # SECURITY: HSTS - Force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # SECURITY: Restrict browser features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # SECURITY: Prevent cross-domain policy abuse
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Client body size (for file uploads)
    # SECURITY: Reduced from 100M to 20M to prevent upload bomb attacks
    client_max_body_size 20M;

    # =========================================================================
    # SSE (Server-Sent Events) for Notifications -> Backend
    # MUST be BEFORE /api/ to match first
    # =========================================================================
    location /api/v2/notifications/stream {
        # SECURITY: Disable access log to prevent token leakage in logs
        access_log off;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-specific settings
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts for SSE (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable chunked transfer encoding for proper SSE
        chunked_transfer_encoding off;

        # Tell proxies not to buffer
        proxy_set_header X-Accel-Buffering no;
    }

    # =========================================================================
    # API Routes -> Backend (NestJS)
    # =========================================================================
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # Uploads -> Backend
    # =========================================================================
    location /uploads/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers (MUST repeat - nginx ignores parent headers when add_header is used)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # Caching for static uploads
        expires 1d;
        add_header Cache-Control "public, immutable" always;
    }

    # =========================================================================
    # Health Check -> Backend
    # =========================================================================
    location = /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # WebSocket (Chat) -> Backend
    # =========================================================================
    location /chat-ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # All Other Routes -> SvelteKit Frontend
    # =========================================================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

