<!doctype html>
<html lang="de" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Google Fonts Performance: dns-prefetch + preconnect (Best Practice 2025) -->
    <!-- dns-prefetch: Early DNS lookup (~20ms saved) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <!-- preconnect: Full connection setup (DNS + TCP + TLS, ~100-200ms saved) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Outfit Font - Main Typography (preload for critical above-the-fold) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      as="style"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Material Symbols - Google Icons (Optimized: subset + display=block) -->
    <!-- Icons: RoleSwitch (manage_accounts, person_apron, supervisor_account), rate-limit (hourglass_check) -->
    <!-- Landing/Security: block, business, check_circle, dns, lock, policy, verified_user, visibility -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght@24,400&icon_names=block,business,check_circle,dns,hourglass_check,lock,manage_accounts,person_apron,policy,supervisor_account,verified_user,visibility&display=block"
    />

    <!-- FOUT Prevention: Hide Material Icons until font loads (Font Loading API) -->
    <!-- Problem: Even with display=block, browser may briefly show text before CSS parses -->
    <!-- Solution: CSS hides icons → JS detects font load → adds class to show icons -->
    <style>
      .material-symbols-outlined {
        visibility: hidden;
      }
      .fonts-loaded .material-symbols-outlined {
        visibility: visible;
      }
    </style>
    <script nonce="%sveltekit.nonce%">
      (function () {
        // FOUC Prevention: Apply theme before first paint
        // Default is dark (html has class="dark"). Remove if user chose light.
        // Landing, login, signup are ALWAYS dark - never remove dark class there.
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        }

        // Font loading detection
        if (document.fonts && document.fonts.check('1em "Material Symbols Outlined"')) {
          document.documentElement.classList.add('fonts-loaded');
        } else if (document.fonts) {
          document.fonts.ready.then(function () {
            document.documentElement.classList.add('fonts-loaded');
          });
        } else {
          document.documentElement.classList.add('fonts-loaded');
        }
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="tap">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
