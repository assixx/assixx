<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firmenkalender - Assixx</title>

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>

    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link id="unified-navigation-styles" rel="stylesheet" href="/styles/unified-navigation.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->
    <!-- Font Awesome - Icons for UI elements -->
    <!-- FullCalendar CSS (v6 doesn't export CSS from npm package) -->
    <link rel="stylesheet" href="/styles/lib/fullcalendar.min.css" />

    <!-- Dashboard Theme - General theme styles -->
    <!-- Dashboard Theme already loaded via main.css - removed duplicate import -->
    <!-- Design System - Search Input Component -->
    <link rel="stylesheet" href="/design-system/primitives/search-input/search-input.css" />
    <!-- Calendar spezifische Styles -->
    <link rel="stylesheet" href="/styles/calendar.css" />
    <link rel="stylesheet" href="/styles/user-info-update.css" />
  </head>
  <body>
    <!-- Unified Navigation -->
    <div id="navigation-container"></div>

    <!-- Main Layout mit Sidebar -->
    <div class="layout-container">
      <!-- Main Content -->
      <main class="bg-[var(--background-primary)] flex-1 min-h-[calc(100vh-60px)] overflow-y-auto w-full p-4">
        <!-- Breadcrumb -->
        <div id="breadcrumb-container"></div>

        <div class="container">
          <!-- Filterleiste -->
          <div class="card mb-6">
            <div class="card__header">
              <h3 class="card__title">
                <i class="fas fa-filter mr-2"></i>
                Filter & Anzeige
              </h3>
              <div class="flex gap-6 flex-wrap items-end justify-between mt-4">
                <!-- Level Filter -->
                <div class="form-field">
                  <label class="form-field__label">Organisationsebene</label>
                  <div class="toggle-group mt-2" id="levelFilter">
                    <button class="toggle-group__btn active" data-value="all" id="filterAll" title="Alle Termine">
                      <i class="fas fa-globe"></i>
                      Gesamt
                    </button>
                    <button class="toggle-group__btn" data-value="company" id="filterCompany" title="Firmentermine">
                      <i class="fas fa-building"></i>
                      Firma
                    </button>
                    <button class="toggle-group__btn" data-value="department" id="filterDepartment" title="Abteilungstermine">
                      <i class="fas fa-sitemap"></i>
                      Abteilung
                    </button>
                    <button class="toggle-group__btn" data-value="team" id="filterTeam" title="Teamtermine">
                      <i class="fas fa-users"></i>
                      Team
                    </button>
                    <button class="toggle-group__btn" data-value="area" id="filterArea" title="Bereichstermine">
                      <i class="fas fa-map-marked-alt"></i>
                      Bereich
                    </button>
                    <button class="toggle-group__btn" data-value="personal" id="filterPersonal" title="Persönliche Termine">
                      <i class="fas fa-user"></i>
                      Meine
                    </button>
                    <button
                      type="button"
                      class="toggle-group__btn"
                      id="showShiftsToggle"
                      title="Schichten anzeigen/ausblenden"
                      data-action="toggle-shifts"
                    >
                      <i class="fas fa-clock"></i>
                      Schichten
                    </button>
                  </div>
                </div>

                <!-- Legend -->
                <div class="form-field">
                  <label class="form-field__label">Legende</label>
                  <div class="legend-container mt-2">
                    <div class="legend-item">
                      <span class="legend-color legend-company"></span>
                      <span class="legend-label">Firma</span>
                    </div>
                    <div class="legend-item">
                      <span class="legend-color legend-department"></span>
                      <span class="legend-label">Abteilung</span>
                    </div>
                    <div class="legend-item">
                      <span class="legend-color legend-team"></span>
                      <span class="legend-label">Team</span>
                    </div>
                    <div class="legend-item">
                      <span class="legend-color legend-area"></span>
                      <span class="legend-label">Bereich</span>
                    </div>
                    <div class="legend-item">
                      <span class="legend-color legend-personal"></span>
                      <span class="legend-label">Persönlich</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Calendar Container -->
          <div class="card calendar-card mb-6" id="calendarContainer">
            <div class="card__header">
              <div class="flex items-center justify-between">
                <h3 class="card__title">
                  <i class="fas fa-calendar-alt mr-2"></i>
                  Kalender
                </h3>
                <div class="flex gap-2">
                  <button id="fullscreenBtn" class="btn btn-icon btn-secondary" title="Vollbild">
                    <i class="fas fa-expand"></i>
                  </button>
                  <!-- Admin-only button - rendered dynamically via JS for security -->
                  <div id="newEventBtnContainer"></div>
                </div>
              </div>
            </div>
            <div class="card__body p-0">
              <div id="calendar"></div>
            </div>
          </div>

          <!-- Upcoming Events -->
          <div class="card mb-6">
            <div class="card__header">
              <h3 class="card__title">
                <i class="fas fa-clock mr-2"></i>
                Anstehende Termine
              </h3>
            </div>
            <div class="card__body">
              <div id="upcomingEvents" class="upcoming-events">
                <!-- Wird dynamisch befüllt -->
                <div class="flex flex-col items-center justify-center min-h-[200px] p-8 text-center">
                  <div class="spinner-ring spinner-ring--md"></div>
                  <p class="mt-3 text-[var(--color-text-secondary)]">Termine werden geladen...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <!-- Ende des layout-container -->

    <!-- Alle Modals werden dynamisch erstellt -->

    <!-- Marked.js for Markdown rendering -->
    <script type="module" src="/scripts/lib/marked.min.js"></script>

    <!-- Calendar Scripts - TypeScript Modules Only -->
    <script type="module" src="/scripts/calendar/index.ts"></script>
    <!-- Unified Navigation -->
    <script type="module" src="/scripts/components/unified-navigation.ts"></script>
    <script type="module" src="/scripts/auth/role-switch.ts"></script>
    <!-- Breadcrumb -->
    <script type="module" src="/scripts/components/breadcrumb.js"></script>
  </body>
</html>
