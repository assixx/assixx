<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assixx - Login</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />

    <!-- Critical CSS - Load immediately to prevent FOUC -->
    <link rel="preload" href="/styles/login.css" as="style" />
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->
    <link rel="stylesheet" href="/styles/login.css" />
  </head>
  <body>
    <!-- Quick redirect check before page renders -->
    <script>
      // FIRST: Check if session expired, timeout, or rate limit - clear storage before any redirect
      const urlParamsInitial = new URLSearchParams(window.location.search);
      if (
        urlParamsInitial.get('session') === 'expired' ||
        urlParamsInitial.get('timeout') === 'true' ||
        urlParamsInitial.get('ratelimit') === 'expired'
      ) {
        // Clear all auth data immediately to prevent redirect loop
        localStorage.removeItem('token');
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        localStorage.removeItem('userRole');
        localStorage.removeItem('user');
        sessionStorage.clear();
        // Clear auth cookies
        document.cookie.split(';').forEach(function (c) {
          if (c.includes('token') || c.includes('Token')) {
            document.cookie = c.replace(/^ +/, '').replace(/=.*/, '=;expires=' + new Date(0).toUTCString() + ';path=/');
          }
        });
      } else {
        // ONLY check for existing token if NOT coming from session expired
        const token = localStorage.getItem('token') || localStorage.getItem('accessToken');
        const userRole = localStorage.getItem('userRole');
        if (token && userRole) {
          // Hide login form immediately while we redirect
          document.documentElement.style.visibility = 'hidden';

          // Redirect based on role (validation happens in background after redirect)
          switch (userRole) {
            case 'root':
              window.location.replace('/root-dashboard');
              break;
            case 'admin':
              window.location.replace('/admin-dashboard');
              break;
            case 'employee':
              window.location.replace('/employee-dashboard');
              break;
          }
        }
      }
    </script>

    <!-- Back to Homepage Button -->
    <a href="/" class="back-button">
      <span class="icon">←</span>
      <span>Zurück zur Hauptseite</span>
    </a>

    <!-- Fragezeichen oben rechts - Glassmorphismus -->
    <div class="help-button" data-action="show-help">?</div>
    <div class="login-container">
      <!-- Login Form -->
      <div class="login-card">
        <!-- Logo inside card -->
        <div class="login-card-logo">
          <img src="../assets/images/logo.png" alt="Assixx Logo" class="login-logo u-cursor-pointer" data-action="reload-page" />
        </div>

        <!-- Alerts are created dynamically by LoginFormController.showError/showInfo -->

        <form id="loginForm">
          <div class="form-field">
            <label class="form-field__label form-field__label--required" for="username">E-Mail</label>
            <input type="email" id="username" class="form-field__control" required autofocus placeholder="" autocomplete="email" />
          </div>
          <div class="form-field">
            <label class="form-field__label form-field__label--required" for="password">Passwort</label>
            <input type="password" id="password" class="form-field__control" required autocomplete="current-password" />
          </div>
          <div class="flex justify-end mt-4">
            <button type="submit" class="btn btn-primary">Anmelden</button>
          </div>
        </form>

        <div class="login-footer">
          <a href="#" data-action="show-password-reset" class="text-secondary">Passwort vergessen?</a>
          <a href="#" data-action="request-access" class="text-secondary">Zugangsdaten beantragen</a>
        </div>
      </div>

      <!-- Company Footer -->
      <div class="login-company">
        <p class="text-secondary">© 2025 Assixx - Powered by Simon Öztürks Computer Service</p>
      </div>
    </div>

    <script type="module">
      import { BrowserFingerprint } from '../scripts/utils/browser-fingerprint.js';

      // Fallback validation in case redirect failed
      (async function validateIfNeeded() {
        const token = localStorage.getItem('token') || localStorage.getItem('accessToken');
        const userRole = localStorage.getItem('userRole');

        // If we still have token/role but are on login page, validate
        if (token && userRole) {
          try {
            const fingerprint = await BrowserFingerprint.generate();
            const response = await fetch('/api/auth/validate', {
              headers: {
                Authorization: `Bearer ${token}`,
                'X-Browser-Fingerprint': fingerprint,
              },
            });

            if (!response.ok || !(await response.json()).valid) {
              // Token is invalid, clear and show login
              localStorage.removeItem('token');
              localStorage.removeItem('userRole');
              localStorage.removeItem('user');
              document.documentElement.style.visibility = 'visible';
            }
          } catch {
            // On error, show login page
            document.documentElement.style.visibility = 'visible';
          }
        } else {
          // No token, show login page
          document.documentElement.style.visibility = 'visible';
        }
      })();
    </script>

    <!-- TypeScript Module - Handles all login interactions -->
    <script type="module">
      import { LoginFormController } from '/scripts/auth/login-form-controller.js';

      // Initialize login form
      const controller = new LoginFormController();
      controller.init();
    </script>
  </body>
</html>
