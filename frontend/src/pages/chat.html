<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat - Assixx</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>

    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link id="unified-navigation-styles" rel="stylesheet" href="/styles/unified-navigation.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->
    <link rel="stylesheet" href="/styles/chat.css" />
    <!-- Modal Base + Confirm Modal (Design System) -->
    <link rel="stylesheet" href="/design-system/primitives/modals/modal.base.css" />
    <link rel="stylesheet" href="/design-system/components/confirm-modal/confirm-modal.css" />
    <link rel="stylesheet" href="/styles/user-info-update.css" />
  </head>
  <body>
    <!-- Unified Navigation -->
    <div id="navigation-container"></div>

    <!-- Main Layout mit Sidebar -->
    <div class="layout-container">
      <!-- Chat Container - Uses chat-page-main for sidebar-collapse aware positioning -->
      <main class="chat-page-main">
        <div class="chat-container">
          <!-- Chat Sidebar -->
          <div class="chat-sidebar">
            <div class="chat-sidebar-header">
              <h2 class="chat-title">
                <i class="fas fa-comments"></i>
                Nachrichten
              </h2>
              <!-- New Chat Button - shown only for root/admin via JS -->
              <button class="btn btn-icon btn-secondary" id="newConversationBtn" title="Neue Unterhaltung starten" hidden>
                <i class="fas fa-plus"></i>
              </button>
            </div>

            <!-- User Search - Only visible for root/admin (hidden for employees) -->
            <div class="search-input-wrapper" id="chatUserSearchWrapper" hidden>
              <div class="search-input" id="chat-user-search-container">
                <i class="search-input__icon fas fa-search"></i>
                <input type="search" id="chatUserSearch" class="search-input__field" placeholder="Benutzer suchen..." autocomplete="off" />
                <button class="search-input__clear" type="button" aria-label="Suche löschen" id="chatUserSearchClear">
                  <i class="fas fa-times"></i>
                </button>
                <div class="search-input__spinner"></div>
              </div>
              <!-- Search Results Dropdown -->
              <div class="search-input__results" id="chatUserSearchResults">
                <!-- Results populated dynamically -->
              </div>
            </div>
            <div class="conversations-list" id="conversationsList">
              <!-- Conversations werden hier dynamisch geladen -->
            </div>
          </div>

          <!-- Main Chat Area -->
          <div class="chat-main u-hidden">
            <!-- Chat Header -->
            <div class="chat-header u-hidden" id="chat-header">
              <div class="chat-header-info">
                <div id="chat-avatar"></div>
                <div class="chat-header-details">
                  <h3 id="chat-partner-name"></h3>
                  <div class="status" id="chat-partner-status"></div>
                </div>
              </div>
              <div class="chat-actions">
                <button class="btn btn-icon btn-secondary" id="searchMessagesBtn" title="Suchen (Strg+F)">
                  <i class="fas fa-search"></i>
                </button>
                <button class="btn btn-icon btn-danger hidden" id="deleteConversationBtn" title="Chat löschen">
                  <i class="fas fa-trash"></i>
                </button>
                <button class="btn btn-icon btn-secondary" title="Mehr Optionen">
                  <i class="fas fa-ellipsis-v"></i>
                </button>
              </div>
            </div>

            <!-- Search Bar (hidden by default) -->
            <div class="chat-search-bar hidden" id="chatSearchBar">
              <div class="chat-search-input-wrapper">
                <i class="fas fa-search chat-search-icon"></i>
                <input type="search" id="chatSearchInput" class="chat-search-input" placeholder="Im Chat suchen..." autocomplete="off" />
                <span class="chat-search-counter" id="chatSearchCounter"></span>
                <button class="btn btn-icon btn-sm" id="chatSearchPrev" title="Vorheriger Treffer">
                  <i class="fas fa-chevron-up"></i>
                </button>
                <button class="btn btn-icon btn-sm" id="chatSearchNext" title="Nächster Treffer">
                  <i class="fas fa-chevron-down"></i>
                </button>
                <button class="btn btn-icon btn-sm" id="chatSearchClose" title="Suche schließen (Esc)">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
              <div class="empty-chat" id="noChatSelected">
                <div class="empty-chat-icon">
                  <i class="fas fa-comments"></i>
                </div>
                <h3>Willkommen im Chat</h3>
                <p>Wählen Sie eine Unterhaltung aus der Liste oder starten Sie eine neue Nachricht.</p>
              </div>
            </div>

            <!-- Message Input -->
            <div class="message-input-container u-hidden" id="chatArea">
              <!-- File Preview (shown when files are selected) -->
              <div id="filePreview" class="file-preview hidden"></div>
              <div class="message-input-wrapper">
                <textarea id="messageInput" class="message-input" placeholder="Nachricht eingeben..." rows="1"></textarea>
                <div class="input-actions">
                  <!-- Schedule Message Button -->
                  <button class="btn btn-icon btn-secondary" id="scheduleBtn" title="Nachricht planen" data-action="open-schedule-modal">
                    <i class="far fa-clock"></i>
                  </button>
                  <!-- Schedule Badge (shown when scheduled) -->
                  <div class="schedule-badge u-hidden" id="scheduleBadge">
                    <i class="far fa-clock"></i>
                    <span class="schedule-badge__time" id="scheduleBadgeTime"></span>
                    <button type="button" class="schedule-badge__clear" data-action="clear-schedule" title="Planung aufheben">
                      <i class="fas fa-times"></i>
                    </button>
                  </div>
                  <button class="btn btn-icon btn-secondary" id="attachmentBtn" title="Datei anhängen">
                    <i class="fas fa-paperclip"></i>
                  </button>
                  <button class="btn btn-icon btn-upload" id="sendButton">
                    <i class="fas fa-paper-plane"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- File Upload Input (hidden, triggered by attachment button) -->
    <input type="file" id="fileInput" class="hidden" multiple />

    <!-- Typing Indicator -->
    <div id="typingIndicator" class="typing-indicator hidden"></div>

    <!-- Notification Toast -->
    <div id="notification" class="notification hidden"></div>

    <!-- Schedule Message Modal (Design System) -->
    <div class="modal-overlay" id="scheduleOverlay">
      <div class="ds-modal ds-modal--sm">
        <div class="ds-modal__header">
          <h2 class="ds-modal__title">
            <i class="far fa-clock"></i>
            Nachricht planen
          </h2>
          <button class="ds-modal__close" data-action="close-schedule-modal">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="ds-modal__body">
          <p style="color: var(--color-text-secondary); margin-bottom: var(--spacing-4)">
            Wählen Sie Datum und Uhrzeit, wann die Nachricht gesendet werden soll.
          </p>
          <!-- Date & Time Row -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-4)">
            <div class="form-field">
              <label class="form-field__label form-field__label--required" for="scheduleDate">Datum</label>
              <input type="date" id="scheduleDate" class="form-field__control" required />
            </div>
            <div class="form-field">
              <label class="form-field__label form-field__label--required" for="scheduleTime">Uhrzeit</label>
              <input type="time" id="scheduleTime" class="form-field__control" required />
            </div>
          </div>
          <small class="form-field__message" style="margin-top: var(--spacing-3)">
            <i class="fas fa-info-circle"></i>
            Mindestens 5 Minuten in der Zukunft, maximal 30 Tage.
          </small>
        </div>
        <div class="ds-modal__footer ds-modal__footer--spaced">
          <button class="btn btn-cancel" data-action="cancel-schedule-modal">Abbrechen</button>
          <button class="btn btn-modal" data-action="confirm-schedule">
            <i class="far fa-clock"></i>
            Planen
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts (TypeScript modules only) -->
    <script type="module" src="/scripts/components/unified-navigation.ts"></script>
    <script type="module" src="/scripts/auth/role-switch.ts"></script>
    <script type="module" src="/scripts/chat/index.ts"></script>
  </body>
</html>
