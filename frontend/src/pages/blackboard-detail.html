<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eintrag - Schwarzes Brett - Assixx</title>

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>

    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/unified-navigation.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="/styles/user-info-update.css" />
    <!-- Reuse kvp-detail styles (same layout structure) -->
    <link rel="stylesheet" href="/styles/kvp-detail.css" />
  </head>

  <body class="blackboard-detail-page">
    <!-- Navigation Container -->
    <div id="navigation-container"></div>

    <!-- Main Layout -->
    <div class="layout-container">
      <main class="flex-1 min-h-[calc(100vh-60px)] p-4 bg-[var(--background-primary)]">
        <!-- Breadcrumb Navigation -->
        <div id="breadcrumb-container"></div>

        <div class="container">
          <!-- Detail Container -->
          <div class="detail-container">
            <!-- Main Content -->
            <div class="detail-main">
              <!-- Header -->
              <div class="detail-header">
                <div>
                  <div class="detail-title" id="entryTitle">Lädt...</div>
                  <div class="detail-meta">
                    <span>
                      <i class="fas fa-user"></i>
                      <span id="authorName"></span>
                    </span>
                    <span>
                      <i class="fas fa-calendar"></i>
                      <span id="createdAt"></span>
                    </span>
                  </div>
                </div>
                <div class="status-priority">
                  <span class="badge" id="priorityBadge"></span>
                </div>
              </div>

              <!-- Details Section -->
              <div class="content-section">
                <h3 class="section-title">
                  <i class="fas fa-info-circle"></i>
                  Details
                </h3>
                <div class="data-list data-list--grid">
                  <div class="data-list__item">
                    <span class="data-list__label">Sichtbarkeit</span>
                    <span class="badge" id="orgLevel"></span>
                  </div>
                  <div class="data-list__item" id="expiresAtItem" hidden>
                    <span class="data-list__label">Gültig bis</span>
                    <span class="data-list__value" id="expiresAt"></span>
                  </div>
                  <div class="data-list__item" id="tagsItem" hidden>
                    <span class="data-list__label">Tags</span>
                    <span class="data-list__value" id="tags"></span>
                  </div>
                </div>
              </div>

              <!-- Content Section -->
              <div class="content-section">
                <h3 class="section-title">
                  <i class="fas fa-align-left"></i>
                  Inhalt
                </h3>
                <div class="section-content" id="entryContent"></div>
              </div>

              <!-- Photo Gallery -->
              <div class="content-section" id="photoSection" hidden>
                <h3 class="section-title">
                  <i class="fas fa-images"></i>
                  Bilder
                </h3>
                <div class="photo-gallery" id="photoGallery">
                  <!-- Dynamic content -->
                </div>
              </div>

              <!-- Comments Section -->
              <div class="comments-section">
                <h3 class="section-title">
                  <i class="fas fa-comments"></i>
                  Kommentare
                  <span class="badge badge--count ml-2" id="commentCount">0</span>
                </h3>

                <!-- Comment Form -->
                <form id="commentForm" class="flex gap-4 mb-6">
                  <div class="form-field flex-1">
                    <textarea
                      class="form-field__control"
                      id="commentInput"
                      placeholder="Kommentar hinzufügen..."
                      rows="3"
                      required
                    ></textarea>
                  </div>
                  <div class="flex items-start">
                    <button type="submit" class="btn btn-primary">
                      <i class="fas fa-paper-plane"></i>
                      Senden
                    </button>
                  </div>
                </form>

                <!-- Comment List -->
                <div class="comment-list" id="commentList">
                  <p class="text-muted">Keine Kommentare vorhanden.</p>
                </div>
              </div>
            </div>

            <!-- Sidebar -->
            <div class="detail-sidebar">
              <!-- Confirmation Status -->
              <div class="sidebar-card" id="confirmationCard">
                <h3 class="section-title">
                  <i class="fas fa-check-circle"></i>
                  Lesebestätigung
                </h3>
                <div id="confirmationStatus">
                  <!-- Dynamic: Rendered by JS based on confirmation status -->
                </div>
              </div>

              <!-- Attachments -->
              <div class="sidebar-card" id="attachmentsCard" hidden>
                <h3 class="section-title">
                  <i class="fas fa-paperclip"></i>
                  Anhänge
                </h3>
                <div class="attachment-list" id="attachmentList">
                  <!-- Dynamic content -->
                </div>
              </div>

              <!-- Actions (Admin Only) -->
              <div class="sidebar-card admin-only" id="actionsCard" hidden>
                <h3 class="section-title">
                  <i class="fas fa-cog"></i>
                  Aktionen
                </h3>
                <div class="action-buttons">
                  <button class="btn btn-light w-full" id="archiveBtn">
                    <i class="fas fa-archive"></i>
                    Archivieren
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Attachment Preview Modal (Design System - like documents-explorer) -->
    <div id="preview-modal" class="modal-overlay">
      <div class="ds-modal ds-modal--xl">
        <div class="ds-modal__header">
          <h3 class="ds-modal__title">
            <i class="fas fa-file mr-2" id="preview-icon"></i>
            <span id="preview-title">Datei Vorschau</span>
          </h3>
          <button class="ds-modal__close" id="preview-close" data-action="close-preview-modal" aria-label="Modal schließen">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="ds-modal__body p-0">
          <!-- PDF Viewer iframe -->
          <iframe id="preview-iframe" class="block w-full h-[70vh] min-h-[600px] border-none hidden" title="Dokumentenvorschau"></iframe>

          <!-- Image Viewer - For JPG/PNG files -->
          <div id="preview-image-container" class="h-[70vh] min-h-[600px] w-full flex items-center justify-center bg-surface-1 hidden">
            <img id="preview-image" class="max-w-full max-h-full object-contain block" alt="Bildvorschau" />
          </div>

          <!-- No Preview Message - For DOCX/XLSX and other files -->
          <div id="preview-no-preview" class="h-[70vh] min-h-[600px] w-full flex items-center justify-center bg-surface-1 hidden">
            <div class="text-center text-content-secondary">
              <i class="fas fa-file-alt text-6xl mb-4"></i>
              <p class="text-lg">Vorschau nicht verfügbar</p>
              <p class="text-sm mt-2">Bitte laden Sie die Datei herunter, um sie anzuzeigen.</p>
            </div>
          </div>

          <!-- File Metadata Footer -->
          <div class="p-4 bg-surface-2 border-t border-border-subtle">
            <div class="flex items-center gap-6 text-sm text-content-secondary">
              <span id="preview-size" class="flex items-center gap-2">
                <i class="fas fa-file-archive"></i>
                <span>--</span>
              </span>
              <span id="preview-uploader" class="flex items-center gap-2">
                <i class="fas fa-user"></i>
                <span>--</span>
              </span>
            </div>
          </div>
        </div>
        <div class="ds-modal__footer">
          <button class="btn btn-cancel" id="preview-cancel" data-action="close-preview-modal">
            <i class="fas fa-times mr-2"></i>
            Schließen
          </button>
          <button class="btn btn-modal" id="preview-download" data-action="download-preview">
            <i class="fas fa-download mr-2"></i>
            Herunterladen
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/scripts/auth/index.ts"></script>
    <script type="module" src="/scripts/pages/blackboard-detail/index.ts"></script>
    <script type="module" src="/scripts/components/navigation/index.ts"></script>
    <script type="module" src="/scripts/auth/role-switch.ts"></script>

    <!-- Breadcrumb Component -->
    <script type="module" src="/scripts/components/breadcrumb.js"></script>
  </body>
</html>
