<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Assixx</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>

    <!-- CSS Styles -->
    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link id="unified-navigation-styles" rel="stylesheet" href="/styles/unified-navigation.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- USE MAIN.CSS WITH TAILWIND -->
    <link rel="stylesheet" href="/styles/lib/fontawesome.min.css" />
    <link rel="stylesheet" href="/styles/admin-dashboard.css" />
    <!-- Page specific styles after main -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/styles/user-info-update.css" />
    <link rel="stylesheet" href="/styles/blackboard-widget.css" />
  </head>
  <body class="admin-dashboard">
    <!-- Unified Navigation -->
    <div id="navigation-container"></div>

    <!-- Main Layout with Sidebar -->
    <div class="layout-container">
      <!-- Main Content Area -->
      <main class="flex-1 min-h-[calc(100vh-60px)] p-4 bg-[var(--background-primary)]">
        <!-- Breadcrumb Navigation -->
        <div id="breadcrumb-container"></div>

        <div class="container">
          <!-- Dashboard Section -->
          <section id="dashboard-section" class="content-section">
            <!-- Dashboard Stats Grid - Using Design System stat cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div class="card-stat">
                <div class="card-stat__icon">
                  <i class="fas fa-users"></i>
                </div>
                <div class="card-stat__value" id="employee-count">0</div>
                <div class="card-stat__label">Mitarbeiter</div>
              </div>
              <div class="card-stat">
                <div class="card-stat__icon">
                  <i class="fas fa-file-alt"></i>
                </div>
                <div class="card-stat__value" id="document-count">0</div>
                <div class="card-stat__label">Dokumente</div>
              </div>
              <div class="card-stat">
                <div class="card-stat__icon">
                  <i class="fas fa-building"></i>
                </div>
                <div class="card-stat__value" id="department-count">0</div>
                <div class="card-stat__label">Abteilungen</div>
              </div>
              <div class="card-stat">
                <div class="card-stat__icon">
                  <i class="fas fa-user-friends"></i>
                </div>
                <div class="card-stat__value" id="team-count">0</div>
                <div class="card-stat__label">Teams</div>
              </div>
            </div>

            <!-- Blackboard Widget - Using Design System Card -->
            <div id="blackboard-widget-container" class="mt-8" data-sidebar-state="loading">
              <!-- Loading placeholder with same styles as final widget -->
              <div class="card animate-pulse">
                <div class="card__header flex justify-between items-center">
                  <h3 class="card__title flex items-center gap-2">
                    <i class="fas fa-thumbtack"></i>
                    Schwarzes Brett
                  </h3>
                  <a
                    href="/blackboard"
                    class="text-sm text-[var(--color-text-secondary)] hover:text-[var(--color-text-primary)] flex items-center gap-1 transition-colors"
                  >
                    Alle anzeigen
                    <i class="fas fa-arrow-right"></i>
                  </a>
                </div>
                <div id="blackboard-widget-content" class="card__body min-h-[200px] flex items-center justify-center">
                  <div class="text-center">
                    <i class="fas fa-spinner fa-spin text-3xl mb-4 text-[var(--color-text-secondary)]"></i>
                    <p class="text-[var(--color-text-secondary)]">Lade Einträge...</p>
                  </div>
                </div>
              </div>
            </div>

            <!-- Main Grid Container - Using Tailwind Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
              <!-- Employee Card - Using Accent Card (Primary/Blue is default) -->
              <div class="max-w-[350px]">
                <div class="card-accent card-accent--static">
                  <div class="card-accent__header">
                    <h3 class="card-accent__title">
                      <i class="fas fa-users" style="color: var(--color-icon-primary)"></i>
                      Mitarbeiter
                    </h3>
                  </div>
                  <div class="card-accent__content">
                    <button class="btn btn-modal w-4/5 mb-3" data-href="/pages/manage-employees.html">Mitarbeiter verwalten</button>
                    <div class="space-y-2" id="recent-employees">
                      <!-- Wird dynamisch gefüllt: Letzte 5 Mitarbeiter -->
                    </div>
                  </div>
                </div>
              </div>

              <!-- Document Card - Using Accent Card with Success variant -->
              <div class="max-w-[350px]">
                <div class="card-accent card-accent--success card-accent--static">
                  <div class="card-accent__header">
                    <h3 class="card-accent__title">
                      <i class="fas fa-file-alt" style="color: var(--color-icon-primary)"></i>
                      Dokumente
                    </h3>
                  </div>
                  <div class="card-accent__content">
                    <button class="btn btn-modal w-4/5 mb-3" data-href="/document-upload">Dokument hochladen</button>
                    <div class="space-y-2" id="recent-documents">
                      <!-- Wird dynamisch gefüllt: Letzte 5 Dokumente -->
                    </div>
                  </div>
                </div>
              </div>

              <!-- Department Card - Using Accent Card with Warning variant -->
              <div class="max-w-[350px]">
                <div class="card-accent card-accent--warning card-accent--static">
                  <div class="card-accent__header">
                    <h3 class="card-accent__title">
                      <i class="fas fa-building" style="color: var(--color-icon-primary)"></i>
                      Abteilungen
                    </h3>
                  </div>
                  <div class="card-accent__content">
                    <button class="btn btn-modal w-4/5 mb-3" data-href="/manage-departments">Abteilungen verwalten</button>
                    <div class="space-y-2" id="department-list">
                      <!-- Wird dynamisch gefüllt -->
                    </div>
                  </div>
                </div>
              </div>

              <!-- Team Card - Using Accent Card with Purple variant -->
              <div class="max-w-[350px]">
                <div class="card-accent card-accent--purple card-accent--static">
                  <div class="card-accent__header">
                    <h3 class="card-accent__title">
                      <i class="fas fa-user-friends" style="color: var(--color-icon-primary)"></i>
                      Teams
                    </h3>
                  </div>
                  <div class="card-accent__content">
                    <button class="btn btn-modal w-4/5 mb-3" data-href="/manage-teams">Teams verwalten</button>
                    <div class="space-y-2" id="team-list">
                      <!-- Wird dynamisch gefüllt -->
                    </div>
                  </div>
                </div>
              </div>

              <!-- Kalender Card - Using Accent Card with Danger variant for visual variety -->
              <div class="max-w-[350px]">
                <div class="card-accent card-accent--danger card-accent--static">
                  <div class="card-accent__header">
                    <h3 class="card-accent__title">
                      <i class="fas fa-calendar" style="color: var(--color-icon-primary)"></i>
                      Kalender
                    </h3>
                  </div>
                  <div class="card-accent__content">
                    <button class="btn btn-modal w-4/5 mb-3" data-href="/calendar">Kalender öffnen</button>
                    <div class="space-y-2" id="calendar-events-list">
                      <!-- Wird dynamisch gefüllt -->
                      <div class="p-2 rounded text-xs">
                        <strong class="block font-semibold">Nächste Termine</strong>
                        <p class="text-[var(--color-text-secondary)] mt-1">Keine anstehenden Termine</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Placeholder for 6th card if needed -->
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- JavaScript Modules -->
    <!-- Unified Navigation -->
    <script type="module" src="/scripts/components/unified-navigation.ts"></script>

    <!-- Dashboard Functionality -->
    <script type="module" src="/scripts/admin/dashboard/index.ts"></script>

    <!-- Role Switch for Admin -->
    <script type="module" src="/scripts/auth/role-switch.ts"></script>

    <!-- Dashboard Initialization (extracted from inline) -->
    <script type="module" src="/scripts/admin/dashboard/init.ts"></script>
  </body>
</html>
