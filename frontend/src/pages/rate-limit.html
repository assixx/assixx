<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zu viele Anfragen - Assixx</title>
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->
    <link rel="stylesheet" href="/styles/rate-limit.css" />
    <!-- Google Material Symbols -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=hourglass_check"
    />
  </head>
  <body class="min-h-screen flex items-center justify-center p-5">
    <div class="card w-full max-w-[450px] text-center animate-fade-in-up">
      <span class="rate-limit-icon material-symbols-outlined">hourglass_check</span>
      <h1 class="text-[28px] font-bold text-[var(--color-text-primary)] mb-4">Zu viele Anfragen</h1>
      <p class="text-base leading-relaxed text-[var(--color-text-secondary)] mb-8">
        Sie haben die maximale Anzahl an Anfragen überschritten. Bitte warten Sie einen Moment, bevor Sie es erneut versuchen.
      </p>
      <div class="bg-[rgb(33_150_243/10%)] border border-[rgb(33_150_243/20%)] rounded-[var(--radius-xl)] p-6 mb-8">
        <div class="text-sm text-[var(--color-text-secondary)] mb-3">Versuchen Sie es wieder in:</div>
        <div class="text-[32px] font-bold text-[var(--color-primary)] countdown" id="countdown">0:20</div>
      </div>
    </div>

    <!-- Rate Limit Controller -->
    <script type="module">
      import { RateLimitController } from '/scripts/rate-limit/rate-limit-controller.js';

      // Initialize controller when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          new RateLimitController().init();
        });
      } else {
        new RateLimitController().init();
      }
    </script>
  </body>
</html>
