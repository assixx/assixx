<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Umfragen - Assixx</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>

    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link id="unified-navigation-styles" rel="stylesheet" href="/styles/unified-navigation.css" />
    <!-- Dom-utils Module für sichere HTML-Sanitization -->
    <script type="module">
      import { setHTML } from '/utils/dom-utils.js';
      window.setHTML = setHTML; // Make available globally
    </script>
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->
    <link rel="stylesheet" href="/styles/lib/fontawesome.min.css" />
    <!-- CSS Styles -->
    <!-- Dashboard Theme already loaded via main.css - removed duplicate import -->
    <link rel="stylesheet" href="/styles/survey-employee.css" />
    <link rel="stylesheet" href="/styles/user-info-update.css" />
  </head>
  <body>
    <!-- Unified Navigation -->
    <div id="navigation-container"></div>

    <!-- Main Layout with Sidebar -->
    <div class="layout-container">
      <main class="flex-1 min-h-[calc(100vh-60px)] p-4 bg-[var(--background-primary)]">
        <!-- Breadcrumb Container -->
        <div id="breadcrumb-container"></div>

        <div class="container">
          <div class="card">
            <div class="card-header flex justify-between items-center">
              <div>
                <h2 class="card-title">Mitarbeiterumfragen</h2>
                <p class="text-secondary">Hier finden Sie alle Umfragen, an denen Sie teilnehmen können oder bereits teilgenommen haben.</p>
              </div>
            </div>
            <div class="card-body">
              <!-- Pending Surveys -->
              <div class="surveys-section">
                <h2 class="section-title">
                  <i class="fas fa-clock"></i>
                  Offene Umfragen
                </h2>
                <div id="pendingSurveys" class="surveys-grid">
                  <!-- Surveys will be loaded here -->
                </div>
              </div>

              <!-- Section Divider -->
              <div class="section-divider"></div>

              <!-- Completed Surveys -->
              <div class="surveys-section">
                <h2 class="section-title">
                  <i class="fas fa-check-circle"></i>
                  Abgeschlossene Umfragen
                </h2>
                <div id="completedSurveys" class="surveys-grid">
                  <!-- Completed surveys will be loaded here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Survey Response Modal - Design System -->
    <div class="modal-overlay" id="surveyModal">
      <form id="surveyForm" class="ds-modal ds-modal--lg">
        <div class="ds-modal__header flex-col items-stretch">
          <!-- Title Row: Title + Close Button -->
          <div class="flex justify-between items-center w-full">
            <h3 class="ds-modal__title" id="modalTitle">Umfrage beantworten</h3>
            <button class="ds-modal__close" data-action="close" type="button" aria-label="Schließen">
              <i class="fas fa-times"></i>
            </button>
          </div>

          <!-- Progress Bar Row (stays visible when body scrolls) -->
          <div class="mt-4 w-full">
            <div class="progress progress--lg">
              <div
                class="progress__bar progress__bar--info"
                id="progressBar"
                role="progressbar"
                aria-valuenow="0"
                aria-valuemin="0"
                aria-valuemax="100"
              ></div>
            </div>
            <div class="progress-text mt-2 text-center text-secondary text-sm" id="progressText">0 von 0 Fragen beantwortet</div>
          </div>
        </div>

        <div class="ds-modal__body">
          <!-- Questions Container -->
          <div id="questionsContainer">
            <!-- Questions will be loaded here -->
          </div>
        </div>

        <div class="ds-modal__footer ds-modal__footer--right">
          <button type="button" class="btn btn-cancel" data-action="close">Abbrechen</button>
          <button type="submit" class="btn btn-modal">
            <i class="fas fa-paper-plane"></i>
            Antworten absenden
          </button>
        </div>
      </form>
    </div>

    <!-- Scripts -->
    <script type="module" src="/scripts/auth/index.js"></script>
    <script type="module" src="/scripts/components/unified-navigation.ts"></script>
    <script type="module" src="/scripts/components/breadcrumb.js"></script>
    <script type="module" src="/scripts/survey/employee/index.ts"></script>
  </body>
</html>
