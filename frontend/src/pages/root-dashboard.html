<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Root Dashboard - Assixx</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>

    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link id="unified-navigation-styles" rel="stylesheet" href="/styles/unified-navigation.css" />
    <!-- CSS Styles -->
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->
    <!-- Dashboard Theme already loaded via main.css - removed duplicate import -->
    <link rel="stylesheet" href="/styles/root-dashboard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/styles/user-info-update.css" />
  </head>
  <body>
    <!-- Unified Navigation -->
    <div id="navigation-container"></div>

    <!-- Employee Number Modal -->
    <div id="employeeNumberModal" class="modal hidden">
      <div class="modal__content max-w-[400px]">
        <div class="modal__header">
          <h2 class="modal__title">Personalnummer eingeben</h2>
        </div>
        <div class="modal__body">
          <p class="mb-5">
            Bitte geben Sie Ihre Personalnummer ein. Diese kann bis zu 10 Zeichen lang sein und Buchstaben, Zahlen sowie Bindestriche
            enthalten.
          </p>
          <form id="employeeNumberForm">
            <div class="form-field">
              <label class="form-field__label form-field__label--required">Personalnummer</label>
              <input
                type="text"
                id="employeeNumberInput"
                class="form-field__control text-center text-sm tracking-wider"
                placeholder="z.B. ABC-123 oder 2025-001"
                maxlength="10"
                pattern="[A-Za-z0-9\-]{1,10}"
                required
              />
              <span class="form-field__message">Erlaubt: Buchstaben, Zahlen und Bindestrich (-), max. 10 Zeichen</span>
            </div>
            <div class="flex justify-end mt-6">
              <button type="submit" class="btn btn-primary">Personalnummer speichern</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Main Layout with Sidebar -->
    <div class="layout-container">
      <!-- Main Content Area -->
      <main class="flex-1 min-h-[calc(100vh-60px)] p-4 bg-[var(--background-primary)]">
        <!-- Breadcrumb Navigation -->
        <div id="breadcrumb-container"></div>

        <div class="container">
          <!-- Dashboard Data Container -->
          <div id="dashboard-data"></div>

          <!-- Activity Logs Card with Data Table (Design System) -->
          <div class="card">
            <div class="card__header flex items-center justify-between">
              <h2 class="card__title">
                <i class="fas fa-history mr-2"></i>
                Aktivitätsverlauf
              </h2>
              <a href="/logs" class="btn btn-link">
                <i class="fas fa-external-link-alt mr-1.5"></i>
                Alle Logs anzeigen
              </a>
            </div>
            <div class="card__body">
              <div class="table-responsive">
                <table class="data-table data-table--hover" id="activity-logs-table">
                  <thead>
                    <tr>
                      <th scope="col">Zeit</th>
                      <th scope="col">Benutzer</th>
                      <th scope="col">Aktion</th>
                      <th scope="col">Details</th>
                      <th scope="col">Status</th>
                    </tr>
                  </thead>
                  <tbody id="activity-logs">
                    <!-- Logs werden hier dynamisch eingefügt -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- JavaScript -->
    <!-- Unified Navigation -->
    <script type="module" src="/scripts/components/unified-navigation.ts"></script>

    <!-- Role Switch for Root -->
    <script type="module" src="/scripts/auth/role-switch.ts"></script>

    <!-- Dashboard initialization with session validation and breadcrumb -->
    <script type="module" src="/scripts/dashboard/root-init.ts"></script>
    <script type="module" src="/scripts/dashboard/root.ts"></script>
  </body>
</html>
