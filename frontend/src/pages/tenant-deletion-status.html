<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenant Löschstatus - Assixx</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Critical Layout State - Prevents Layout Shift -->
    <script src="/scripts/critical/sidebar-init.js"></script>
    <link rel="stylesheet" href="/styles/main.css" />
    <!-- TAILWIND + GLOBAL STYLES -->

    <!-- Unified Navigation CSS - Load immediately to prevent FOUC -->
    <link id="unified-navigation-styles" rel="stylesheet" href="/styles/unified-navigation.css" />
    <!-- Dom-utils Module für sichere HTML-Sanitization -->
    <script type="module">
      import { setHTML } from '/utils/dom-utils.js';
      window.setHTML = setHTML; // Make available globally
    </script>
    <link rel="stylesheet" href="/styles/tenant-deletion-status.css" />
  </head>
  <body>
    <!-- Unified Navigation -->
    <div id="navigation-container"></div>

    <!-- Main Layout with Sidebar -->
    <div class="layout-container">
      <!-- Main Content Area -->
      <main class="flex-1 min-h-[calc(100vh-60px)] p-4 bg-[var(--background-primary)]">
        <!-- Breadcrumb Navigation -->
        <div id="breadcrumb-container"></div>

        <div class="container">
          <div class="card">
            <div class="card__header">
              <h2 class="card__title">
                <i class="fas fa-trash-alt mr-2"></i>
                Tenant Löschstatus
              </h2>
              <p class="text-[var(--color-text-secondary)] mt-2">Übersicht aller Löschanfragen und deren Status</p>
            </div>

            <div class="card__body">
              <!-- Prozess-Erklärung (Kompakt) -->
              <div class="process-info">
                <h3 class="process-info__title">
                  <i class="fas fa-info-circle mr-2"></i>
                  Löschprozess (DSGVO-konform)
                </h3>
                <div class="process-info__content">
                  <span class="process-info__item">
                    <strong>Zwei-Personen-Prinzip:</strong>
                    Root 1 beantragt, Root 2 genehmigt
                  </span>
                  <span class="process-info__item">
                    <strong>24h Cooling-Off</strong>
                    vor Genehmigung
                  </span>
                  <span class="process-info__item">
                    <strong>30 Tage Grace Period</strong>
                    nach Genehmigung
                  </span>
                  <span class="process-info__item">
                    <strong>Backup</strong>
                    vor Löschung
                  </span>
                  <span class="process-info__item">
                    <strong>Emergency Stop</strong>
                    jederzeit möglich
                  </span>
                </div>
              </div>
              <div id="statusContent" class="status-grid">
                <!-- Status cards will be inserted here by TypeScript -->
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="/scripts/components/navigation/index.ts"></script>

    <!-- Breadcrumb Component -->
    <script type="module">
      import { initBreadcrumb } from '/scripts/components/breadcrumb.js';
      initBreadcrumb();
    </script>

    <!-- Page Controller -->
    <script type="module" src="/scripts/tenant-deletion/index.ts"></script>
  </body>
</html>
