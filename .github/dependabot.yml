# Dependabot configuration — see ADR-027 (Image Pinning) and ADR-008 (Dependencies)
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Coverage map (what is and is NOT auto-tracked):
#   - npm                : All workspace dependencies (root pnpm workspace)
#   - github-actions     : All workflow action versions
#   - docker             : ONLY /docker/Dockerfile (production); Dependabot's docker
#                          ecosystem ignores files with custom names like Dockerfile.dev
#                          (see dependabot/dependabot-core#4449). NODE_VERSION ARG
#                          default in /docker/Dockerfile is the canonical Node bump.
#                          The other three Dockerfiles inherit via compose build args.
#   - docker-compose     : All `image:` tags in /docker/docker-compose.yml
#                          (closes the gap that ADR-027 amendment 2026-04-07 documented:
#                          Grafana/Loki/Prometheus/Redis/Nginx version tracking).
#
# NOT covered (manual or future Renovate adoption):
#   - Dockerfile.pg-partman → FROM postgres:18.3-alpine is hardcoded, NOT via ARG
#   - Dockerfile.dev / Dockerfile.frontend → Node version comes from compose ARG
#     (so the Dockerfile-side default value can drift from the compose-injected one)

version: 2
updates:
  # Root workspace dependencies (pnpm workspace)
  # IMPORTANT: Only update from root for pnpm workspaces
  # Note: Security updates fire REAL-TIME (ignore schedule) via Dependabot
  # Security Updates setting — the interval below only governs version updates.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    # patch + minor gebündelt (low-risk, schnell mergbar).
    # major bleibt bewusst ungrouped → einzelne PRs, manuelles Breaking-Review.
    groups:
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"

  # GitHub Actions — monthly reicht (wenig Churn, keine Runtime-CVEs)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  # Dockerfile FROM directives — only /docker/Dockerfile (the only standard-named one)
  # See coverage map above for the limitation on custom Dockerfile names.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # docker-compose `image:` tags — closes the PLG-stack drift gap (ADR-027 amendment)
  # GA since 2025-02-25:
  # https://github.blog/changelog/2025-02-25-dependabot-version-updates-now-support-docker-compose-in-general-availability/
  - package-ecosystem: "docker-compose"
    directory: "/docker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    # Grafana paused 2026-04-25 — manual review required (vendor-bug concerns).
    # Re-enable by removing this block once cleared.
    ignore:
      - dependency-name: "grafana/grafana"
    # Group by stack to keep PR noise manageable
    groups:
      plg-stack:
        patterns:
          - "grafana/*"
          - "prom/*"
      infra:
        patterns:
          - "nginx"
          - "redis"
