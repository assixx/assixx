name: Auto Label PRs

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply label from PR title
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();

            const prefixMap = {
              'feat': 'enhancement',
              'fix': 'bug',
              'docs': 'documentation',
              'chore': 'chore',
              'ci': 'github_actions',
              'refactor': 'refactor',
              'perf': 'performance',
              'security': 'security',
              'breaking': 'breaking-change',
            };

            for (const [prefix, label] of Object.entries(prefixMap)) {
              if (title.startsWith(`${prefix}:`) || title.startsWith(`${prefix}(`) || title.startsWith(`${prefix}/`)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  labels: [label],
                });
                console.log(`Applied label: ${label}`);
                return;
              }
            }

            // Fallback: version-style titles like "v0.4.6: ..."
            if (/^v\d+\.\d+\.\d+/.test(title)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['development'],
              });
              console.log('Applied label: release (version prefix detected)');
              return;
            }

            console.log('No matching prefix found');
