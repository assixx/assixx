name: Docker Image Build & Registry Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".changeset/**"
      - "LICENSE"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".changeset/**"
      - "LICENSE"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Use lowercase repository name for Docker registry compatibility
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test-docker-compose:
    runs-on: ubuntu-latest
    needs: [build-and-push-image, security-scan-trivy]
    # Run on:
    # - Pull requests (pre-merge validation)
    # - Direct pushes to main (hotfixes, admin merges - safety net)
    # - Skip feature branch pushes (tested via PR)
    # - Skip tag pushes (main was already tested)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    # Prevent multiple integration tests from running simultaneously
    concurrency:
      group: docker-integration-test
      cancel-in-progress: false # Don't cancel, wait for completion
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Docker Compose tests
        run: |
          cp docker/.env.example docker/.env
          # Create external volumes (required by docker-compose.yml)
          docker volume create assixx_postgres_data
          docker volume create assixx_redis_data

          cd docker
          COMPOSE="docker compose -f docker-compose.yml -f docker-compose.ci.yml"

          # Build backend image (deletion-worker reuses the same assixx-backend:ci image)
          $COMPOSE build backend

          # Start infrastructure first (avoids cascade failure if backend crashes)
          $COMPOSE up -d postgres redis

          # Wait for PostgreSQL to be HEALTHY (max 60s)
          echo "Waiting for PostgreSQL to be HEALTHY..."
          for i in $(seq 1 60); do
            HEALTH_STATUS=$(docker inspect --format "{{.State.Health.Status}}" assixx-postgres 2>/dev/null || echo "unknown")
            if [ "$HEALTH_STATUS" = "healthy" ]; then
              echo "PostgreSQL is healthy after ${i}s"
              break
            fi
            if [ $((i % 10)) -eq 0 ]; then
              echo "PostgreSQL health: $HEALTH_STATUS (${i}s)"
            fi
            sleep 1
          done

          if [ "$HEALTH_STATUS" != "healthy" ]; then
            echo "ERROR: PostgreSQL failed to become healthy"
            docker logs assixx-postgres --tail 20 2>&1 || true
            exit 1
          fi

          # Start backend separately (not deletion-worker — avoids depends_on cascade)
          $COMPOSE up -d backend

          # Wait for backend to be healthy (max 120s — matches Dockerfile start_period)
          echo "Waiting for backend to be healthy..."
          BACKEND_HEALTHY=false
          for i in $(seq 1 120); do
            # Check if container is still running (detect crash loops)
            CONTAINER_STATUS=$(docker inspect --format "{{.State.Status}}" assixx-backend 2>/dev/null || echo "unknown")
            if [ "$CONTAINER_STATUS" = "exited" ] || [ "$CONTAINER_STATUS" = "dead" ]; then
              echo "ERROR: Backend container crashed (status: $CONTAINER_STATUS)"
              echo "Backend logs:"
              docker logs assixx-backend 2>&1 || true
              exit 1
            fi

            HEALTH=$(docker inspect --format "{{.State.Health.Status}}" assixx-backend 2>/dev/null || echo "unknown")
            if [ "$HEALTH" = "healthy" ]; then
              echo "Backend is healthy after ${i}s"
              BACKEND_HEALTHY=true
              break
            fi

            # Show logs every 20 seconds
            if [ $((i % 20)) -eq 0 ]; then
              echo "Backend health: $HEALTH (${i}s)"
              docker logs assixx-backend --tail 10 2>&1 || true
            fi

            sleep 1
          done

          if [ "$BACKEND_HEALTHY" != "true" ]; then
            echo "ERROR: Backend failed to become healthy after 120s"
            echo "Full backend logs:"
            docker logs assixx-backend 2>&1 || true
            $COMPOSE ps
            exit 1
          fi

          # Start deletion-worker (depends on backend being healthy)
          $COMPOSE up -d deletion-worker

          $COMPOSE ps

          # Test the health endpoint
          curl -f http://localhost:3000/health || exit 1

          $COMPOSE down

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== All Container Status ==="
          docker ps -a || true
          echo ""
          echo "=== Backend Logs (last 100 lines) ==="
          docker logs assixx-backend --tail 100 2>&1 || true
          echo ""
          echo "=== Backend Container Inspect ==="
          docker inspect assixx-backend 2>&1 | head -80 || true
          echo ""
          echo "=== PostgreSQL Logs (last 30 lines) ==="
          docker logs assixx-postgres --tail 30 2>&1 || true
          echo ""
          echo "=== Redis Logs ==="
          docker logs assixx-redis --tail 10 2>&1 || true
          echo ""
          echo "=== Docker Compose Status ==="
          cd docker && docker compose -f docker-compose.yml -f docker-compose.ci.yml ps || true

  security-scan-trivy:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag for Trivy
        id: trivy-tag
        run: |
          # For PRs: github.ref_name is "111/merge" (invalid tag), use "pr-<number>" instead
          # For branches: sanitize the same way docker/metadata-action does (/ → -)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            SANITIZED=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            echo "tag=$SANITIZED" >> $GITHUB_OUTPUT
          fi

      - name: Check for critical vulnerabilities (blocks PR)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repository }}:${{ steps.trivy-tag.outputs.tag }}
          version: "v0.69.3"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          scanners: "vuln"

      - name: Report HIGH and MEDIUM vulnerabilities (informational)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        if: always()
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repository }}:${{ steps.trivy-tag.outputs.tag }}
          version: "v0.69.3"
          format: "table"
          exit-code: "0"
          severity: "HIGH,MEDIUM"
          scanners: "vuln"
