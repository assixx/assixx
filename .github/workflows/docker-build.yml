name: Docker Image Build & Registry Push

on:
  push:
    branches:
      - main
      - develop
      - "feature/*"
      - "feature/docker-*"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Use lowercase repository name for Docker registry compatibility
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test-docker-compose:
    runs-on: ubuntu-latest
    needs: [build-and-push-image, security-scan-trivy]
    # Run on:
    # - Pull requests (pre-merge validation)
    # - Direct pushes to main (hotfixes, admin merges - safety net)
    # - Skip feature branch pushes (tested via PR)
    # - Skip tag pushes (main was already tested)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    # Prevent multiple integration tests from running simultaneously
    concurrency:
      group: docker-integration-test
      cancel-in-progress: false # Don't cancel, wait for completion
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Docker Compose tests
        run: |
          cp docker/.env.example docker/.env
          # Create external volumes (required by docker-compose.yml)
          docker volume create assixx_postgres_data
          docker volume create assixx_redis_data
          # Use CI override to reduce resource limits (GitHub runners have only 2 CPUs)
          # Only build the backend service — deletion-worker reuses the same image (assixx-backend:ci)
          cd docker && \
            docker compose -f docker-compose.yml -f docker-compose.ci.yml build backend && \
            docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

          # Wait for PostgreSQL to be HEALTHY
          echo "Waiting for PostgreSQL to be HEALTHY..."
          MAX_WAIT=60
          COUNTER=0

          while [ $COUNTER -lt $MAX_WAIT ]; do
            HEALTH_STATUS=$(docker inspect --format "{{.State.Health.Status}}" assixx-postgres 2>/dev/null || echo "unknown")

            if [ "$HEALTH_STATUS" = "healthy" ]; then
              echo "✓ PostgreSQL is healthy after $COUNTER seconds!"
              break
            fi

            # Show status every 10 seconds
            if [ $((COUNTER % 10)) -eq 0 ]; then
              echo "PostgreSQL health status: $HEALTH_STATUS (waited ${COUNTER}s)"

              # Show container status
              if [ $COUNTER -eq 0 ]; then
                echo "Container status:"
                docker ps -a | grep postgres || true
              fi

              # Show logs after 30 seconds if still not healthy
              if [ $COUNTER -ge 30 ] && [ "$HEALTH_STATUS" != "healthy" ]; then
                echo "Recent PostgreSQL logs:"
                docker logs assixx-postgres --tail 5 2>&1 || true
              fi
            fi

            COUNTER=$((COUNTER + 1))
            sleep 1
          done

          # Final check
          if [ "$HEALTH_STATUS" != "healthy" ]; then
            echo "ERROR: PostgreSQL failed to become healthy after ${MAX_WAIT} seconds"
            echo "Final PostgreSQL status: $HEALTH_STATUS"
            echo "Full PostgreSQL logs:"
            docker logs assixx-postgres 2>&1 || true
            exit 1
          fi

          # Wait for backend to be healthy (max 90 seconds)
          echo "Waiting for backend service to be healthy..."
          for i in {1..90}; do
            if docker compose ps | grep "assixx-backend" | grep -q "(healthy)"; then
              echo "Backend service is healthy!"
              break
            fi

            # Show logs every 15 seconds
            if [ $((i % 15)) -eq 0 ]; then
              echo "Backend logs:"
              docker compose logs backend --tail 20
            fi

            echo "Waiting... ($i/90)"
            sleep 1
          done

          docker compose ps

          # If not healthy, show full logs
          if ! docker compose ps | grep "assixx-backend" | grep -q "(healthy)"; then
            echo "Backend failed to become healthy. Full logs:"
            docker compose logs backend
          fi

          # Test the health endpoint
          curl -f http://localhost:3000/health || exit 1

          docker compose -f docker-compose.yml -f docker-compose.ci.yml down

      - name: Debug PostgreSQL on failure
        if: failure()
        run: |
          echo "=== Debugging PostgreSQL failure ==="
          echo "PostgreSQL Container Status:"
          docker ps -a | grep postgres || true
          echo ""
          echo "PostgreSQL Health Status:"
          docker inspect --format "{{.State.Health.Status}}" assixx-postgres 2>/dev/null || echo "Container not found"
          echo ""
          echo "PostgreSQL Logs (last 50 lines):"
          docker logs assixx-postgres --tail 50 2>&1 || true
          echo ""
          echo "PostgreSQL Container Inspect:"
          docker inspect assixx-postgres 2>&1 || true
          echo ""
          echo "Docker Compose Status:"
          cd docker && docker compose ps || true

  security-scan-trivy:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: lowercase
        run: |
          echo "repository=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag for Trivy
        id: trivy-tag
        run: |
          # For PRs: github.ref_name is "111/merge" (invalid tag), use "pr-<number>" instead
          # For branches: sanitize the same way docker/metadata-action does (/ → -)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            SANITIZED=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            echo "tag=$SANITIZED" >> $GITHUB_OUTPUT
          fi

      - name: Check for critical vulnerabilities (blocks PR)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repository }}:${{ steps.trivy-tag.outputs.tag }}
          version: "v0.69.0"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          scanners: "vuln"

      - name: Report HIGH and MEDIUM vulnerabilities (informational)
        uses: aquasecurity/trivy-action@0.33.1
        if: always()
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repository }}:${{ steps.trivy-tag.outputs.tag }}
          version: "v0.69.0"
          format: "table"
          exit-code: "0"
          severity: "HIGH,MEDIUM"
          scanners: "vuln"
