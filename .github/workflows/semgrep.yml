name: Semgrep Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/**"
      - "docker/**"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/**"
      - "docker/**"
  schedule:
    # Weekly full scan — Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST (Backend)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/nestjs \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/nodejs \
            --config p/dockerfile \
            --exclude-rule=generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling \
            --exclude-rule=generic.nginx.security.request-host-used.request-host-used \
            --exclude-rule=generic.nginx.security.header-redefinition.header-redefinition \
            --exclude-rule=generic.html-templates.security.var-in-href.var-in-href \
            --metrics=off \
            --error \
            --sarif-output=semgrep-results.sarif \
            --json-output=semgrep-results.json \
            backend/ shared/ docker/
          # Excluded rules (false positives with mitigations in place):
          # - H2C smuggling: mitigated by map block restricting $allowed_upgrade to "websocket" only
          # - $host usage: mitigated by default_server block rejecting unknown Host headers (return 444)
          # - header-redefinition: intentional — location blocks MUST repeat headers (nginx drops parent headers)
          # - var-in-href: all template URLs are server-generated or validated (actionUrl has protocol whitelist)

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep-results.sarif
            semgrep-results.json
          retention-days: 30
