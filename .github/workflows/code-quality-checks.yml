name: Code Quality Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".changeset/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".changeset/**"
      - "LICENSE"

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    name: Backend & Shared (TypeScript, ESLint, Prettier)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check (Shared)
        run: cd shared && pnpm run typecheck

      - name: Run TypeScript check (Backend)
        run: cd backend && pnpm run typecheck

      - name: Run ESLint (Backend + Shared)
        run: cd backend && pnpm run lint

      - name: Check formatting (Backend)
        run: cd backend && pnpm run prettier

      - name: Check formatting (Shared)
        run: cd shared && pnpm run prettier

  frontend-quality:
    runs-on: ubuntu-latest
    name: Frontend (Svelte Check, ESLint, Prettier, Stylelint)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Svelte Check (TypeScript + Svelte)
        run: cd frontend && pnpm run check

      - name: Run ESLint
        run: cd frontend && pnpm run lint

      - name: Check formatting
        run: cd frontend && pnpm run format:check

      - name: Run Stylelint
        run: pnpm run stylelint

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests (Backend + Shared + Frontend)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SvelteKit types
        run: cd frontend && pnpm exec svelte-kit sync

      - name: Run Unit Tests with Coverage
        run: pnpm vitest run --project unit --project frontend-unit --coverage

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

      - name: Upload Coverage Report (Artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  docker-build-verification:
    runs-on: ubuntu-latest
    name: Docker Build Verification (no push)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: |
          cd docker
          docker build -f Dockerfile -t assixx-backend-test:latest ..

      - name: Build PostgreSQL Docker Image (pg_partman)
        run: |
          cd docker
          docker build -f Dockerfile.pg-partman -t assixx-postgres-test:latest ..

      - name: Test Docker Compose Config
        run: |
          cd docker
          cp .env.example .env
          docker compose config
