name: Code Quality Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    name: Backend (TypeScript, ESLint, Prettier)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: cd backend && pnpm run typecheck

      - name: Run ESLint
        run: cd backend && pnpm run lint

      - name: Check formatting
        run: cd backend && pnpm run prettier

  frontend-quality:
    runs-on: ubuntu-latest
    name: Frontend (Svelte Check, ESLint, Prettier, Stylelint)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Svelte Check (TypeScript + Svelte)
        run: cd frontend && pnpm run check

      - name: Run ESLint
        run: cd frontend && pnpm run lint

      - name: Check formatting
        run: cd frontend && pnpm run format:check

      - name: Run Stylelint
        run: pnpm run stylelint

  docker-build-verification:
    runs-on: ubuntu-latest
    name: Docker Build Verification (no push)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        run: |
          cd docker
          docker build -f Dockerfile -t assixx-backend-test:latest ..

      - name: Test Docker Compose Config
        run: |
          cd docker
          cp .env.example .env
          docker compose config
