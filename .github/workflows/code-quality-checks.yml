name: Code Quality Checks

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".changeset/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".changeset/**"
      - "LICENSE"

permissions:
  contents: read

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    name: Backend & Shared (TypeScript, ESLint, Prettier)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check (Shared)
        run: cd shared && pnpm run typecheck

      - name: Run TypeScript check (Backend)
        run: cd backend && pnpm run typecheck

      - name: Run ESLint (Backend + Shared)
        run: cd backend && pnpm run lint

      - name: Check formatting (Backend)
        run: cd backend && pnpm run prettier

      - name: Check formatting (Shared)
        run: cd shared && pnpm run prettier

  frontend-quality:
    runs-on: ubuntu-latest
    name: Frontend (Svelte Check, ESLint, Prettier, Stylelint)
    permissions:
      contents: read
    # Dummy values for PUBLIC_* env vars consumed by `svelte-kit sync` during
    # type generation. Without them, the generator emits a narrower module
    # declaration for `$env/dynamic/public` (index-signature only, no concrete
    # keys), which diverges from the local type that Doppler-backed dev uses.
    # The divergence flips `@typescript-eslint/no-unnecessary-type-assertion`
    # between local (silent) and CI (errors) on the `env as Record<...>` casts
    # in Turnstile.svelte, login/+page.svelte, signup/+page.svelte.
    # Values are compile-time only — never executed at runtime by lint/check.
    # See ADR-041 (svelte-kit sync pre-step discipline).
    env:
      PUBLIC_SENTRY_DSN: ""
      PUBLIC_TURNSTILE_SITE_KEY: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Svelte Check (TypeScript + Svelte)
        run: cd frontend && pnpm run check

      - name: Run ESLint
        run: cd frontend && pnpm run lint

      - name: Check formatting
        run: cd frontend && pnpm run format:check

      - name: Run Stylelint
        run: pnpm run stylelint

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests (Backend + Shared + Frontend)
    permissions:
      contents: read
    # See frontend-quality job for rationale. frontend-unit tests import from
    # $env/dynamic/public transitively via components under test; without these
    # dummies, svelte-kit sync generates a divergent ambient.d.ts and tests see
    # different types than locally.
    env:
      PUBLIC_SENTRY_DSN: ""
      PUBLIC_TURNSTILE_SITE_KEY: ""

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SvelteKit types
        run: cd frontend && pnpm exec svelte-kit sync

      - name: Run Unit Tests with Coverage
        run: pnpm vitest run --project unit --project frontend-unit --coverage

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: backend
          disable_search: true
          fail_ci_if_error: false

      - name: Upload Coverage Report (Artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  security-audit:
    runs-on: ubuntu-latest
    name: Security Audit (pnpm audit — CVE-Gate)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Blocks PR on HIGH or CRITICAL CVEs in prod OR dev deps.
      # Build-chain attacks (ua-parser-js, event-stream) are real — scan all.
      # If a CVE is unpatched/accepted, add to pnpm.auditConfig.ignoreCves in package.json.
      - name: pnpm audit (HIGH+CRITICAL blocks)
        run: pnpm audit --audit-level=high

      - name: pnpm audit (MODERATE informational)
        if: always()
        run: pnpm audit --audit-level=moderate || true

  docker-build-verification:
    runs-on: ubuntu-latest
    name: Docker Build Verification (no push)
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ADR-027 Stage 1 enforcement: every external image must have a semver-style
      # tag (with at least one dot) or a sha256 digest. Whitelisted: locally-built
      # assixx-* images and ${NODE_VERSION}-substituted FROM lines (compose injects
      # the actual version via build args).
      - name: Verify image pinning (ADR-027 Stage 1)
        run: |
          set -euo pipefail
          UNPINNED=$(grep -E '^\s*(image:\s*\S+|FROM\s+\S+)' \
                       docker/docker-compose*.yml docker/Dockerfile* \
                     | grep -vE 'assixx-(backend|frontend|postgres):' \
                     | grep -vE ':[^[:space:]]*[0-9]+\.[0-9]+|@sha256:|node:\$\{NODE_VERSION' \
                     || true)
          if [ -n "$UNPINNED" ]; then
            echo "::error::ADR-027 violation: unpinned image tag(s) found."
            echo "::error::Every external image must use a fully-qualified version tag (e.g. nginx:1.29.8-alpine) or a sha256 digest."
            echo "$UNPINNED"
            exit 1
          fi
          echo "ADR-027 Stage 1 OK: all image references are pinned."

      - name: Build Backend Docker Image
        run: |
          cd docker
          docker build -f Dockerfile -t assixx-backend-test:latest ..

      - name: Build PostgreSQL Docker Image (pg_partman)
        run: |
          cd docker
          docker build -f Dockerfile.pg-partman -t assixx-postgres-test:latest ..

      - name: Test Docker Compose Config
        run: |
          cd docker
          cp .env.example .env
          docker compose config
