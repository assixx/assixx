changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
    authors:
      - dependabot
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Security
      labels:
        - security
    - title: Performance
      labels:
        - performance
    - title: Documentation
      labels:
        - documentation
    - title: Infrastructure
      labels:
        - github_actions
        - chore
        - refactor
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - "*"
