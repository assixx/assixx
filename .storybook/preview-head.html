<!--
  Storybook Theme Integration:
  - html.dark: Default to dark mode (matches initialGlobals in preview.js).
    The decorator in preview.js toggles this class based on background selection.
  - body background: base.css sets body { background: var(--main-bg) } as fallback.
    Storybook addon overrides via .sb-show-main with solid colors (#000/#fafafa).
  - body::after: base.css gradient overlay (--main-bg-gradient) stays enabled —
    sits between body background and content via z-index: -100.
-->
<script>
  // Apply dark class immediately to prevent FOUC.
  // The decorator in preview.js toggles this class based on background selection.
  document.documentElement.classList.add('dark');
</script>

/>
